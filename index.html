<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iron & Word</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 15px;
      margin: 10px;
      width: 250px;
      border-radius: 10px;
      border: none;
      background: #6b705c;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>Iron & Word</h1>

<button id="loginBtn">Continue with Google</button>

<p id="status">Loading...</p>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

console.log("JS LOADED ✅");

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

const btn = document.getElementById("loginBtn");

btn.addEventListener("click", async () => {
  console.log("CLICK WORKS ✅");

  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://adamdev090.github.io/iron-word-app/"
    }
  });

  if (error) {
    alert(error.message);
    console.error(error);
  }
});

const { data } = await supabase.auth.getUser();

if (data.user) {
  document.getElementById("status").innerText =
    "Logged in as: " + data.user.email;
} else {
  document.getElementById("status").innerText = "Not logged in";
}
</script>

</body>
</html>
