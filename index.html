<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Iron & Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f0ece2;
    --surface: #faf8f2;
    --surface2: #e8e2d4;
    --border: #ddd8c8;
    --text: #3a3828;
    --text2: #6b6650;
    --text3: #a09880;
    --olive: #4a5a38;
    --olive-light: rgba(74,90,56,0.09);
    --gold: #c9a84c;
    --blue: #3d5f75;
    --red: #7a4040;
    --tab-h: 68px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --r: 14px;
    --r-sm: 10px;
    --max-w: 700px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── AUTH ── */
  #auth-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 0;
    position: relative;
    overflow: hidden;
    background: #e8e0d0;
  }

  /* Mountain/fog SVG scene */
  .auth-bg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }

  /* Auth layout — centered vertically, works on iPhone */
  .auth-card {
    position: relative; z-index: 2;
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 36px calc(32px + env(safe-area-inset-bottom, 0px));
    margin-bottom: 8vh;
  }

  .auth-logo-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 0;
    margin-bottom: 24px;
    filter: drop-shadow(0 6px 20px rgba(58,56,40,0.22));
  }

  .auth-title {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    font-size: 34px; font-weight: 700;
    color: #5a4e36; letter-spacing: -0.5px; text-align: center;
    margin-top: 12px;
  }
  .auth-tagline {
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px; font-weight: 300;
    color: #8a7a5a; letter-spacing: 1px;
    margin: 4px 0 36px; text-align: center;
  }

  /* Frosted glass login box */
  .auth-glass {
    width: 100%; max-width: 320px;
    background: rgba(252,249,243,0.82);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 8px 40px rgba(58,56,40,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  .btn-google {
    display: flex; align-items: center; gap: 12px;
    background: var(--olive); border: none;
    border-radius: 50px; padding: 15px 28px;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400;
    color: #fff; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(74,90,56,0.4);
    width: 100%; justify-content: center;
  }
  .btn-google:active { transform: scale(0.97); opacity: 0.9; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  .auth-footer {
    font-size: 10px; color: #8a8060;
    font-weight: 300; letter-spacing: 0.5px; text-align: center;
  }

  /* ── APP ── */
  #app { display: none; padding-bottom: calc(var(--tab-h) + var(--safe-bottom)); }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(240,236,226,0.95);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: calc(var(--safe-top) + 6px) 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner {
    max-width: var(--max-w); margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .topbar-title {
    font-family: 'Lora', serif; font-size: 20px; font-weight: 500;
    color: var(--olive); letter-spacing: -0.2px;
  }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  /* ── PREVIEW TOGGLE (adam only) ── */
  .preview-toggle {
    display: none;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    align-items: center;
  }
  .preview-toggle.show { display: flex; }

  .preview-pill {
    padding: 5px 14px; border-radius: 16px; border: none;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500; color: var(--text3);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .preview-pill.active {
    background: var(--olive); color: white;
    box-shadow: 0 1px 4px rgba(74,90,56,0.3);
  }

  /* log-as badge */
  .log-badge {
    display: none; font-size: 11px; font-weight: 500;
    color: var(--olive); background: var(--olive-light);
    padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px;
  }
  .log-badge.show { display: block; }

  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.15s; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--surface2); }

  /* ── PAGES ── */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }
  .page-inner { max-width: var(--max-w); margin: 0 auto; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 24px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border-radius: var(--r); padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.03);
    margin-bottom: 12px;
  }

  /* ── PERIOD PICKER ── */
  .period-picker {
    display: flex; gap: 6px; margin-bottom: 14px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 1px;
  }
  .period-picker::-webkit-scrollbar { display: none; }
  .period-btn {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400;
    color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .period-btn.active { background: var(--olive); border-color: var(--olive); color: white; }

  /* ── COMPARISON GRID ── */
  .compare-header { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .compare-col {
    background: var(--surface); border-radius: var(--r);
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden;
  }
  .compare-col-head {
    background: var(--olive); color: white; padding: 10px 16px;
    font-family: 'Lora', serif; font-size: 15px; font-weight: 500;
    text-align: center;
  }
  .compare-col-head.muted { background: var(--surface2); color: var(--text2); }
  .compare-col-body { padding: 14px 16px; }
  .compare-stat {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .compare-stat:last-child { border-bottom: none; padding-bottom: 0; }
  .compare-stat-label { font-size: 12px; color: var(--text2); font-weight: 400; display: flex; align-items: center; gap: 6px; }
  .compare-stat-num { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.5px; }
  .compare-stat-num.leading { color: var(--olive); }
  .compare-stat-num.trailing { color: var(--text3); }

  /* ── PRIVATE STRIP ── */
  .private-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .private-card {
    background: var(--surface); border-radius: var(--r); padding: 16px;
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .private-icon { font-size: 18px; margin-bottom: 6px; display: block; }
  .private-num { font-family: 'Lora', serif; font-size: 32px; font-weight: 500; letter-spacing: -1px; line-height: 1; }
  .private-label { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── SOLO STATS (Ariel view) ── */
  .solo-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .solo-card {
    background: var(--surface); border-radius: var(--r); padding: 18px 16px;
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    position: relative; overflow: hidden;
  }
  .solo-card::after {
    content: ''; position: absolute; bottom: -16px; right: -16px;
    width: 64px; height: 64px; border-radius: 50%; opacity: 0.06;
  }
  .solo-card.workout::after { background: var(--olive); }
  .solo-card.bible::after { background: var(--gold); }
  .solo-icon { font-size: 18px; margin-bottom: 8px; display: block; }
  .solo-num {
    font-family: 'Lora', serif; font-size: 40px; font-weight: 500;
    letter-spacing: -1px; line-height: 1; color: var(--text);
  }
  .solo-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 300; }
  .solo-ytd { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── HISTORY ITEMS ── */
  .history-item {
    padding: 12px 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .history-item:last-child { border-bottom: none; padding-bottom: 0; }
  .history-item:first-child { padding-top: 0; }
  .history-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 1px;
  }
  .history-icon.workout { background: rgba(74,90,56,0.1); }
  .history-icon.bible { background: rgba(201,168,76,0.12); }
  .history-icon.cold { background: rgba(61,95,117,0.1); }
  .history-icon.sauna { background: rgba(122,64,64,0.1); }
  .history-body { flex: 1; min-width: 0; }
  .history-owner { font-size: 11px; color: var(--olive); font-weight: 500; margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .history-meta { font-size: 12px; color: var(--text3); margin-top: 2px; font-weight: 300; }
  .history-notes { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; line-height: 1.4; }
  .history-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .history-time { font-size: 11px; color: var(--text3); font-weight: 300; }
  .delete-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 4px; transition: color 0.15s; }
  .delete-btn:active { color: var(--red); }

  /* ── HIST TABS ── */
  .hist-tabs {
    display: flex; gap: 0; margin-bottom: 16px;
    background: var(--surface2); border-radius: 10px; padding: 3px;
    border: 1px solid var(--border);
  }
  .hist-tab {
    flex: 1; padding: 7px 12px; border-radius: 8px; border: none;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 400; color: var(--text2);
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .hist-tab.active { background: var(--surface); color: var(--olive); font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  /* ── LOG TYPE GRID ── */
  .log-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .log-type-btn {
    padding: 18px 12px; border-radius: var(--r);
    border: 1.5px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .log-type-btn .log-icon { font-size: 22px; }
  .log-type-btn .log-name { font-size: 12px; font-weight: 500; color: var(--text2); }
  .log-type-btn.selected { border-color: var(--olive); background: var(--olive-light); box-shadow: 0 0 0 1px var(--olive); }
  .log-type-btn.selected .log-name { color: var(--olive); }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; padding: 13px 14px; border-radius: var(--r-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400;
    color: var(--text); outline: none; transition: border-color 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--olive); background: var(--surface); }
  .form-input::placeholder { color: var(--text3); }

  /* ── CHIPS ── */
  .chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--bg); font-family: 'Inter', sans-serif; font-size: 13px;
    font-weight: 400; color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .chip.selected { background: var(--olive); border-color: var(--olive); color: white; }

  /* ── SLIDER ── */
  .slider-value { font-family: 'Lora', serif; font-size: 36px; font-weight: 500; color: var(--olive); text-align: center; margin-bottom: 8px; letter-spacing: -1px; }
  input[type=range] { width: 100%; height: 3px; border-radius: 2px; background: var(--border); outline: none; -webkit-appearance: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--olive); box-shadow: 0 2px 8px rgba(74,90,56,0.3); }
  .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 8px; font-weight: 300; letter-spacing: 0.5px; }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%; padding: 15px; border-radius: 50px; border: none;
    background: var(--olive); color: white; font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    margin-top: 8px; box-shadow: 0 4px 16px rgba(74,90,56,0.25);
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── PROFILE ── */
  .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--olive); display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 28px; color: white; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(74,90,56,0.2); }
  .profile-name { font-family: 'Lora', serif; font-size: 26px; font-weight: 500; margin-bottom: 4px; }
  .profile-email { font-size: 13px; color: var(--text3); margin-bottom: 24px; font-weight: 300; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    background: rgba(250,248,242,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-start; padding-top: 8px; z-index: 200;
  }
  .nav-inner { width: 100%; max-width: 480px; margin: 0 auto; display: flex; align-items: flex-start; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; cursor: pointer; border: none; background: none; }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; }
  .nav-item.active .nav-label { color: var(--olive); }
  .nav-fab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; margin-top: -18px; cursor: pointer; border: none; background: none; padding: 0; }
  .fab-circle { width: 52px; height: 52px; border-radius: 50%; background: var(--olive); display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; font-weight: 300; box-shadow: 0 4px 16px rgba(74,90,56,0.35); transition: transform 0.15s; line-height: 1; padding-bottom: 2px; }
  .nav-fab:active .fab-circle { transform: scale(0.92); }
  .nav-fab .nav-label { color: var(--text3); }
  .nav-fab.active .nav-label { color: var(--olive); }


  /* ── PERIOD PICKER ── */
  .dash-period-bar {
    display: flex; gap: 6px; margin-bottom: 16px;
    background: var(--surface2); border-radius: 12px; padding: 4px;
  }
  .dash-period-bar button {
    flex: 1; padding: 8px 4px; border: none; border-radius: 9px;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 400; color: var(--text2);
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .dash-period-bar button.active {
    background: var(--surface); color: var(--olive);
    font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  /* Month scroll strip */
  /* Custom range row */
  .custom-range-wrap {
    display: none;
    gap: 8px; margin-bottom: 12px; align-items: center;
  }
  .custom-range-wrap input[type="date"] {
    flex: 1; padding: 8px 10px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface);
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
    outline: none;
  }
  .custom-range-wrap input[type="date"]:focus { border-color: var(--olive); }
  .custom-range-sep { font-size: 12px; color: var(--text3); flex-shrink: 0; }

  /* ── DATE PICKER IN FORMS ── */
  .date-picker-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .date-picker-label { font-size: 13px; color: var(--text2); font-weight: 400; flex: 1; }
  .date-picker-input {
    padding: 7px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--bg); font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--text); outline: none;
    transition: border-color 0.15s; cursor: pointer;
  }
  .date-picker-input:focus { border-color: var(--olive); }

  /* ── IMPORT TOOL ── */
  .import-section { margin-top: 8px; }
  .import-box {
    background: var(--surface); border-radius: var(--r); padding: 20px;
    border: 1.5px dashed var(--border); margin-bottom: 12px; text-align: center;
  }
  .import-box-title { font-family: 'Lora', serif; font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .import-box-sub { font-size: 12px; color: var(--text3); font-weight: 300; margin-bottom: 16px; line-height: 1.6; }
  .import-input { width: 100%; padding: 11px 14px; border-radius: var(--r-sm); border: 1.5px solid var(--border); background: var(--bg); font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); outline: none; margin-bottom: 10px; }
  .import-input:focus { border-color: var(--olive); }
  .import-log { font-size: 12px; color: var(--text2); margin-top: 12px; line-height: 1.8; text-align: left; background: var(--surface2); border-radius: 8px; padding: 12px; display: none; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 28px 16px; color: var(--text3); }
  .empty-text { font-size: 13px; font-weight: 300; }

  
/* ── GOOGLE SHEETS IMPORT (Adam only) ── */
window.runImport = async () => {
  const url = document.getElementById("import-url").value.trim();
  const log = document.getElementById("import-log");
  log.style.display = "block";
  log.textContent = "Fetching sheet...";

  if (!url.includes("docs.google.com/spreadsheets")) {
    log.textContent = "❌ Please paste a valid Google Sheets URL."; return;
  }

  // Extract sheet ID and convert to CSV export URL
  const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!match) { log.textContent = "❌ Could not extract sheet ID from URL."; return; }
  const sheetId = match[1];

  // Get gid if present
  const gidMatch = url.match(/gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : "0";
  const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

  let csv;
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error("Could not fetch sheet — make sure sharing is set to 'Anyone with the link'");
    csv = await res.text();
  } catch(e) {
    log.textContent = "❌ " + e.message; return;
  }

  const rows = csv.trim().split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g,"").trim()));
  const headers = rows[0].map(h => h.toLowerCase());
  log.textContent = `✅ Found ${rows.length - 1} rows. Headers: ${headers.join(", ")}\n\nPreview your columns then confirm below.`;

  // Show column mapping UI
  log.innerHTML += `<br><br><strong>Column mapping detected:</strong><br>` +
    headers.map((h,i) => `${i}: ${h}`).join("<br>") +
    `<br><br>Expected columns (case-insensitive): date, owner/user, type, workout_type, duration, intensity, focus, time_of_day, passage, notes<br><br>` +
    `<button class="btn-primary" onclick="confirmImport()" style="margin-top:8px;max-width:200px">Confirm & Import</button>`;

  // Store parsed rows for confirmImport
  window._importRows = rows;
  window._importHeaders = headers;
};

window.confirmImport = async () => {
  const rows = window._importRows;
  const headers = window._importHeaders;
  const log = document.getElementById("import-log");

  const idx = (name) => headers.findIndex(h => h.includes(name));

  const dateIdx = idx("date");
  const ownerIdx = idx("owner") >= 0 ? idx("owner") : idx("user");
  const typeIdx = idx("type");
  const workoutTypeIdx = idx("workout");
  const durationIdx = idx("duration");
  const intensityIdx = idx("intensity");
  const focusIdx = idx("focus");
  const timeIdx = idx("time");
  const passageIdx = idx("passage");
  const notesIdx = idx("note");

  let inserted = 0, skipped = 0;

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2 || !r[dateIdx]) { skipped++; continue; }

    const dateStr = r[dateIdx];
    let parsedDate;
    try {
      parsedDate = new Date(dateStr);
      if (isNaN(parsedDate)) { skipped++; continue; }
    } catch(e) { skipped++; continue; }

    const owner = ownerIdx >= 0 ? (r[ownerIdx].toLowerCase().includes("ariel") ? "ariel" : "adam") : "adam";
    const type = typeIdx >= 0 ? (r[typeIdx].toLowerCase().includes("bible") ? "bible" : "workout") : "workout";

    const data = {};
    if (workoutTypeIdx >= 0 && r[workoutTypeIdx]) data.workout_type = r[workoutTypeIdx];
    if (durationIdx >= 0 && r[durationIdx]) data.duration = r[durationIdx];
    if (intensityIdx >= 0 && r[intensityIdx]) data.intensity = parseInt(r[intensityIdx]) || null;
    if (focusIdx >= 0 && r[focusIdx]) data.focus = r[focusIdx];
    if (timeIdx >= 0 && r[timeIdx]) data.time_of_day = r[timeIdx];
    if (passageIdx >= 0 && r[passageIdx]) data.passage = r[passageIdx];
    if (notesIdx >= 0 && r[notesIdx]) data.notes = r[notesIdx];

    const { error } = await supabase.from("logs").insert([{
      user_id: currentUser.id,
      user_email: currentUser.email,
      type, owner, data,
      created_at: new Date(dateStr + "T12:00:00").toISOString(),
      deleted: false
    }]);

    if (error) { skipped++; } else { inserted++; }
    log.textContent = `Importing... ${inserted} inserted, ${skipped} skipped`;
  }

  log.textContent = `✅ Import complete! ${inserted} entries imported, ${skipped} skipped.\nRefresh the dashboard to see your data.`;
};

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

const NETLIFY_URL = "https://ironandword.netlify.app";

let currentUser = null, currentUserName = "";
let previewAs = "adam";
let logAs = "adam";
let dashMode = "month";
let dashMonth = new Date().getMonth();
let dashYear = new Date().getFullYear();
let historyPeriod = "all", histTab = "all";
let selectedLogType = null, logFormData = {};

/* ── AUTH ── */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: NETLIFY_URL, queryParams: { prompt: "select_account" } }
  });
};
window.logout = async () => { await supabase.auth.signOut(); location.reload(); };

async function init() {
  const h = window.location.hash, s = window.location.search;
  if (h || s.includes("code=") || s.includes("access_token")) {
    try { await supabase.auth.exchangeCodeForSession(window.location.href); } catch(e) {}
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { document.getElementById("auth-screen").style.display = "flex"; return; }

  // Check if this user has any logs in the database — if not, they're not allowed
  // Identity (adam vs ariel) is determined by checking the owner field in their logs
  const { data: profile, error: profileErr } = await supabase
    .from("logs")
    .select("owner")
    .eq("deleted", false)
    .limit(1);

  // If they have no records at all, check via a direct owner lookup
  const { data: ownerCheck } = await supabase
    .from("logs")
    .select("owner")
    .limit(1);

  // Determine identity: RLS will only return rows this user is allowed to see
  // Adam can see all rows; Ariel can only see her own
  // So we check: can this user see rows owned by "adam"?
  const { data: adamRows } = await supabase
    .from("logs")
    .select("id")
    .eq("owner", "adam")
    .eq("deleted", false)
    .limit(1);

  const { data: arielRows } = await supabase
    .from("logs")
    .select("id")
    .eq("owner", "ariel")
    .eq("deleted", false)
    .limit(1);

  // If they can't see any rows at all, they're not an authorised user
  const canSeeAdam = adamRows && adamRows.length > 0;
  const canSeeAriel = arielRows && arielRows.length > 0;

  if (!canSeeAdam && !canSeeAriel) {
    await supabase.auth.signOut();
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Inter',sans-serif;color:#6b6650">🔒 Private App</div>`;
    return;
  }

  // Adam can see both; Ariel can only see ariel rows (RLS blocks adam rows for her)
  currentUser = session.user;
  currentUserName = canSeeAdam && canSeeAriel ? "adam" : "ariel";
  previewAs = currentUserName;
  logAs = currentUserName;

  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  if (currentUserName === "adam") {
    document.getElementById("preview-toggle").classList.add("show");
    document.getElementById("switch-btn").style.display = "flex";
    document.getElementById("lt-cold").style.display = "flex";
    document.getElementById("lt-sauna").style.display = "flex";
    document.getElementById("hist-tab-private").style.display = "block";
    document.getElementById("pill-ariel").addEventListener("click", () => {
      document.getElementById("hist-tab-private").style.display = "none";
      if (histTab === "private") { histTab = "all"; document.querySelectorAll(".hist-tab").forEach(b => b.classList.remove("active")); document.querySelector(".hist-tab").classList.add("active"); }
    });
    document.getElementById("pill-adam").addEventListener("click", () => {
      document.getElementById("hist-tab-private").style.display = "block";
    });
  }

  initDashPicker();
  document.getElementById("profile-avatar").textContent = currentUserName === "adam" ? "A" : "Ar";
  document.getElementById("profile-name").textContent = currentUserName === "adam" ? "Adam" : "Ariel";
  document.getElementById("profile-email").textContent = "Signed in with Google";

  loadDashboard(); loadHistory();
}

/* ── PREVIEW TOGGLE (dashboard view) ── */
window.setPreview = (who) => {
  previewAs = who;
  document.getElementById("pill-adam").classList.toggle("active", who === "adam");
  document.getElementById("pill-ariel").classList.toggle("active", who === "ariel");
  document.getElementById("topbar-title").textContent = who === "ariel" ? "Ariel's View" : "Iron & Word";
  loadDashboard(); loadHistory();
};

/* ── LOG AS TOGGLE (who you're logging for) ── */
window.toggleLogAs = () => {
  logAs = logAs === "adam" ? "ariel" : "adam";
  document.getElementById("log-badge").classList.toggle("show", logAs === "ariel");
};

/* ── NAV ── */
window.showPage = (page) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-item, .nav-fab").forEach(n => n.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function initDashPicker() {
  const now = new Date();
  dashMonth = now.getMonth();
  dashYear = now.getFullYear();
  // Set month button label to current month name
  const monthBtn = document.getElementById("dp-month");
  if (monthBtn) monthBtn.textContent = MONTHS_FULL[now.getMonth()];
  // Default custom range to current month
  const pad = n => String(n).padStart(2,"0");
  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById("custom-from").value = `${y}-${pad(m+1)}-01`;
  document.getElementById("custom-to").value = `${y}-${pad(m+1)}-${new Date(y, m+1, 0).getDate()}`;
}

function selectMonthChip(el, month, year) {
  document.querySelectorAll(".month-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  dashMonth = month; dashYear = year;
  loadDashboard();
}

window.setDashMode = (mode) => {
  dashMode = mode;
  ["dp-month","dp-ytd","dp-custom"].forEach(id => {
    document.getElementById(id)?.classList.remove("active");
  });
  document.getElementById("dp-" + mode)?.classList.add("active");
  document.getElementById("custom-range-wrap").style.display = mode === "custom" ? "flex" : "none";
  loadDashboard();
};

function getDashRange() {
  const now = new Date();
  now.setHours(23, 59, 59, 999);
  if (dashMode === "month") {
    const s = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0);
    const e = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
    return { start: s, end: e };
  } else if (dashMode === "ytd") {
    const s = new Date(now.getFullYear(), 0, 1, 0, 0, 0, 0);
    return { start: s, end: now };
  } else if (dashMode === "custom") {
    const from = document.getElementById("custom-from").value;
    const to = document.getElementById("custom-to").value;
    const s = from ? new Date(from + "T00:00:00") : new Date(now.getFullYear(), 0, 1);
    const e = to ? new Date(to + "T23:59:59") : now;
    return { start: s, end: e };
  }
  return { start: new Date(now.getFullYear(), 0, 1), end: now };
}

function getDashLabel() {
  const now = new Date();
  if (dashMode === "month") return MONTHS_FULL[now.getMonth()] + " " + now.getFullYear();
  if (dashMode === "ytd") return "Year to Date " + now.getFullYear();
  if (dashMode === "custom") {
    const from = document.getElementById("custom-from")?.value;
    const to = document.getElementById("custom-to")?.value;
    if (from && to) return from + " → " + to;
    return "Custom Range";
  }
  return "";
}

function filterByRange(data, range) {
  return data.filter(r => { const d = new Date(r.created_at); return d >= range.start && d <= range.end; });
}

// Keep for history backward compat
function getPeriodRange(p) {
  const now = new Date(); let start;
  if (p === "week") { start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0); }
  else if (p === "month") start = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (p === "year") start = new Date(now.getFullYear(), 0, 1);
  else start = new Date(2020, 0, 1);
  return { start, end: now };
}
function filterByPeriod(data, p) {
  const { start, end } = getPeriodRange(p);
  return data.filter(r => { const d = new Date(r.created_at); return d >= start && d <= end; });
}

async function loadHistory() {
  const isAdam = currentUserName === "adam";
  const showPrivate = isAdam && previewAs === "adam";

  // Everyone sees both users' public data
  const owners = ["adam","ariel"];
  const viewingAsAriel = previewAs === "ariel" || currentUserName === "ariel";

  const { data: all } = await supabase.from("logs").select("*")
    .eq("deleted", false).in("owner", owners)
    .order("created_at", { ascending: false });
  if (!all) return;

  // Use "all" period so full history is always visible; filter by period if not "all"
  let filtered = historyPeriod === "all" ? all : filterByPeriod(all, historyPeriod);

  // Never show private entries when viewing as Ariel (whether real Ariel or Adam previewing)
  if (viewingAsAriel) {
    filtered = filtered.filter(r => r.type !== "cold" && r.type !== "sauna");
  }

  if (histTab === "workout") filtered = filtered.filter(r => r.type === "workout");
  else if (histTab === "bible") filtered = filtered.filter(r => r.type === "bible");
  else if (histTab === "private" && !viewingAsAriel) filtered = filtered.filter(r => r.type === "cold" || r.type === "sauna");
  else if (histTab === "private" && viewingAsAriel) filtered = []; // safety fallback

  // Only show delete buttons when Adam is viewing as himself
  const canShowDelete = currentUserName === "adam" && previewAs === "adam";
  document.getElementById("hist-list").innerHTML = filtered.length
    ? filtered.map(r => itemHTML(r, canShowDelete)).join("")
    : `<div class="empty" style="padding:24px 0"><div class="empty-text">Nothing here yet</div></div>`;
}

function itemHTML(row, showDelete) {
  const d = new Date(row.created_at);
  const date = d.toLocaleDateString("en-GB", {day:"numeric", month:"short"});
  const time = d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  const icons = { workout:"🏋️", bible:"📖", cold:"🧊", sauna:"🔥" };
  let title="", meta="", notes="";

  if (row.type === "workout") {
    title = row.data?.workout_type || "Workout";
    meta = [row.data?.focus, row.data?.duration&&row.data.duration+" min", row.data?.intensity&&"Intensity "+row.data.intensity+"/10", row.data?.time_of_day].filter(Boolean).join(" · ");
    notes = row.data?.notes || "";
  } else if (row.type === "bible") {
    title = row.data?.passage || "Bible Reading";
    meta = row.data?.duration ? row.data.duration+" min" : "";
    notes = row.data?.notes || "";
  } else if (row.type === "cold") {
    title = row.data?.method || "Cold Exposure";
    meta = [row.data?.duration&&row.data.duration+" min", row.data?.temp&&row.data.temp+"°C", row.data?.place].filter(Boolean).join(" · ");
    notes = row.data?.notes || "";
  } else if (row.type === "sauna") {
    title = row.data?.sauna_type || "Sauna";
    meta = [row.data?.location, row.data?.duration&&row.data.duration+" min", row.data?.cycles&&row.data.cycles+" cycles"].filter(Boolean).join(" · ");
    notes = row.data?.notes || "";
  }

  const canDelete = showDelete && (row.user_email === currentUser.email || currentUserName === "adam");
  const ownerLabel = row.owner === "adam" ? "Adam" : "Ariel";

  return `<div class="history-item" id="entry-${row.id}">
    <div class="history-icon ${row.type}">${icons[row.type]||"○"}</div>
    <div class="history-body">
      <div class="history-owner">${ownerLabel}</div>
      <div class="history-title">${title}</div>
      ${meta ? `<div class="history-meta">${meta}</div>` : ""}
      ${notes ? `<div class="history-notes">${notes}</div>` : ""}
    </div>
    <div class="history-right">
      <div class="history-time">${date} · ${time}</div>
      ${canDelete ? `<button class="delete-btn" onclick="deleteEntry(${row.id})">✕</button>` : ""}
    </div>
  </div>`;
}

/* ── GOOGLE SHEETS IMPORT (Adam only) ── */
window.runImport = async () => {
  const url = document.getElementById("import-url").value.trim();
  const log = document.getElementById("import-log");
  log.style.display = "block";
  log.textContent = "Fetching sheet...";

  if (!url.includes("docs.google.com/spreadsheets")) {
    log.textContent = "❌ Please paste a valid Google Sheets URL."; return;
  }

  // Extract sheet ID and convert to CSV export URL
  const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!match) { log.textContent = "❌ Could not extract sheet ID from URL."; return; }
  const sheetId = match[1];

  // Get gid if present
  const gidMatch = url.match(/gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : "0";
  const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

  let csv;
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error("Could not fetch sheet — make sure sharing is set to 'Anyone with the link'");
    csv = await res.text();
  } catch(e) {
    log.textContent = "❌ " + e.message; return;
  }

  const rows = csv.trim().split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g,"").trim()));
  const headers = rows[0].map(h => h.toLowerCase());
  log.textContent = `✅ Found ${rows.length - 1} rows. Headers: ${headers.join(", ")}\n\nPreview your columns then confirm below.`;

  // Show column mapping UI
  log.innerHTML += `<br><br><strong>Column mapping detected:</strong><br>` +
    headers.map((h,i) => `${i}: ${h}`).join("<br>") +
    `<br><br>Expected columns (case-insensitive): date, owner/user, type, workout_type, duration, intensity, focus, time_of_day, passage, notes<br><br>` +
    `<button class="btn-primary" onclick="confirmImport()" style="margin-top:8px;max-width:200px">Confirm & Import</button>`;

  // Store parsed rows for confirmImport
  window._importRows = rows;
  window._importHeaders = headers;
};

window.confirmImport = async () => {
  const rows = window._importRows;
  const headers = window._importHeaders;
  const log = document.getElementById("import-log");

  const idx = (name) => headers.findIndex(h => h.includes(name));

  const dateIdx = idx("date");
  const ownerIdx = idx("owner") >= 0 ? idx("owner") : idx("user");
  const typeIdx = idx("type");
  const workoutTypeIdx = idx("workout");
  const durationIdx = idx("duration");
  const intensityIdx = idx("intensity");
  const focusIdx = idx("focus");
  const timeIdx = idx("time");
  const passageIdx = idx("passage");
  const notesIdx = idx("note");

  let inserted = 0, skipped = 0;

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2 || !r[dateIdx]) { skipped++; continue; }

    const dateStr = r[dateIdx];
    let parsedDate;
    try {
      parsedDate = new Date(dateStr);
      if (isNaN(parsedDate)) { skipped++; continue; }
    } catch(e) { skipped++; continue; }

    const owner = ownerIdx >= 0 ? (r[ownerIdx].toLowerCase().includes("ariel") ? "ariel" : "adam") : "adam";
    const type = typeIdx >= 0 ? (r[typeIdx].toLowerCase().includes("bible") ? "bible" : "workout") : "workout";

    const data = {};
    if (workoutTypeIdx >= 0 && r[workoutTypeIdx]) data.workout_type = r[workoutTypeIdx];
    if (durationIdx >= 0 && r[durationIdx]) data.duration = r[durationIdx];
    if (intensityIdx >= 0 && r[intensityIdx]) data.intensity = parseInt(r[intensityIdx]) || null;
    if (focusIdx >= 0 && r[focusIdx]) data.focus = r[focusIdx];
    if (timeIdx >= 0 && r[timeIdx]) data.time_of_day = r[timeIdx];
    if (passageIdx >= 0 && r[passageIdx]) data.passage = r[passageIdx];
    if (notesIdx >= 0 && r[notesIdx]) data.notes = r[notesIdx];

    const { error } = await supabase.from("logs").insert([{
      user_id: currentUser.id,
      user_email: currentUser.email,
      type, owner, data,
      created_at: new Date(dateStr + "T12:00:00").toISOString(),
      deleted: false
    }]);

    if (error) { skipped++; } else { inserted++; }
    log.textContent = `Importing... ${inserted} inserted, ${skipped} skipped`;
  }

  log.textContent = `✅ Import complete! ${inserted} entries imported, ${skipped} skipped.\nRefresh the dashboard to see your data.`;
};

/* ── TOAST ── */
window.showToast = (msg) => {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
};

window.onload = init;
</script>
