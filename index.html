<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron & Word</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

const GITHUB_USER = "adamdev090";
const GITHUB_REPO = "iron-word-app";

const ALLOWED_USERS = [
  "adamhlavka@gmail.com",
  "zmudariel@gmail.com"
];

let currentUser = null;

/* LOGIN */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.href,
      queryParams: { prompt: "select_account" }
    }
  });
};

/* LOGOUT */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* INIT */
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("auth").style.display = "block";
    loadVersion();
    return;
  }

  const user = session.user;
  const email = user.email.toLowerCase();

  // ACCESS CONTROL
  if (!ALLOWED_USERS.includes(email)) {
    await supabase.auth.signOut();

    document.body.innerHTML = `
      <div style="text-align:center;margin-top:80px;">
        <h2>Private App 🔒</h2>
        <p>${email}</p>
        <button onclick="location.reload()">Try again</button>
      </div>
    `;
    return;
  }

  currentUser = user;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText =
    "Welcome " + (email.includes("adam") ? "Adam" : "Ariel");

  loadDashboard();
  loadHistory();
  loadVersion();
}

/* VERSION */
async function loadVersion() {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits`
    );
    const data = await res.json();

    if (!data || !data[0]) return;

    const date = new Date(data[0].commit.author.date);

    document.getElementById("version").innerText =
      `Updated: ${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;

  } catch {
    document.getElementById("version").innerText =
      "Version unavailable";
  }
}

/* SAVE */
window.save = async () => {
  const type = document.getElementById("type").value;

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type,
    data: {},
    created_at: new Date().toISOString(),
    deleted: false
  }]);

  loadHistory();
  loadDashboard();
};

/* DELETE */
window.deleteEntry = async (id) => {
  await supabase.from("logs")
    .update({ deleted: true })
    .eq("id", id);

  loadHistory();
  loadDashboard();
};

/* DASHBOARD */
async function loadDashboard() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false);

  let workouts = 0;
  let bible = 0;

  data.forEach(row => {
    if (row.type === "workout") workouts++;
    if (row.type === "bible") bible++;
  });

  document.getElementById("dashboard").innerHTML =
    `🏋️ ${workouts} workouts • 📖 ${bible}`;
}

/* HISTORY */
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  let html = "";

  data.slice(0,5).forEach(row => {
    const d = new Date(row.created_at);

    html += `
      <div class="history-item">
        <div style="display:flex;justify-content:space-between;">
          <strong>${row.type}</strong>
          <button onclick="deleteEntry(${row.id})">✕</button>
        </div>
        <div>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

window.onload = init;
</script>

<style>
body {
  font-family: -apple-system;
  background: #f4f4ef;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  max-width: 420px;
  border-radius: 15px;
}

button {
  background: #7a7f5a;
  color: white;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
}

.history-item {
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

#version {
  font-size: 12px;
  color: #888;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>Iron & Word</h1>
<div id="version"></div>

<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" style="display:none">

  <div class="card">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Dashboard</h3>
    <div id="dashboard"></div>
  </div>

  <div class="card">
    <h3>Quick Log</h3>

    <select id="type">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
    </select>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

</body>
</html>
