<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iron & Word</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f6f6f2;
      color: #1a1a1a;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 16px;
      max-width: 420px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    button {
      background: #6b705c;
      color: white;
      border: none;
      padding: 14px;
      margin: 10px;
      width: 90%;
      border-radius: 12px;
      font-size: 16px;
    }

    input, select {
      padding: 10px;
      margin: 6px;
      width: 90%;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .small {
      font-size: 13px;
      color: gray;
    }
  </style>
</head>

<body>

<h1>Iron & Word</h1>

<button onclick="login()">Continue with Google</button>
<button onclick="logout()">Logout</button>

<p id="user"></p>

<div id="dashboard" style="display:none;">

  <div class="card">
    <h2 id="welcome"></h2>
    <p id="stats"></p>
  </div>

  <div class="card">
    <h3>➕ Record Session</h3>

    <select id="type">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
      <option value="practice">Personal Practice</option>
      <option value="test">Workout Test</option>
    </select>

    <input id="date" type="datetime-local">

    <div id="dynamic"></div>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

let currentUser = null;

// LOGIN
async function login() {
  await supabase.auth.signInWithOAuth({
    provider: 'google'
  });
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// LOAD USER
async function loadUser() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) return;

  currentUser = data.user;

  document.getElementById("user").innerText = data.user.email;
  document.getElementById("welcome").innerText =
    "Welcome " + data.user.email.split("@")[0];

  document.getElementById("dashboard").style.display = "block";

  loadStats();
  loadHistory();
}

// DYNAMIC FORM
document.getElementById("type").addEventListener("change", renderForm);

function renderForm() {
  const type = document.getElementById("type").value;
  let html = "";

  if (type === "workout") {
    html = `
      <select id="workout_type">
        <option>Kettlebell</option>
        <option>Dumbbell + Barbell</option>
        <option>Running</option>
        <option>Swimming</option>
        <option>Biking</option>
        <option>Hiking</option>
      </select>

      <select id="location">
        <option>Home</option>
        <option>Gym</option>
        <option>Hotel</option>
        <option>Work</option>
      </select>

      <input id="duration" placeholder="Duration (min)">
      <input id="intensity" placeholder="Intensity (1-10)">
    `;
  }

  if (type === "bible") {
    html = `
      <input id="duration" placeholder="Minutes">
      <input id="notes" placeholder="Notes">
    `;
  }

  if (type === "practice") {
    html = `
      <select id="practice_type">
        <option>Cold Exposure</option>
        <option>Sauna</option>
        <option>Reading</option>
        <option>Friendship</option>
        <option>Marriage</option>
        <option>Kids</option>
      </select>

      <input id="notes" placeholder="Details / notes">
    `;
  }

  if (type === "test") {
    html = `
      <input id="test_name" placeholder="Test name">
      <input id="result" placeholder="Result">
      <input id="equipment" placeholder="Equipment">
    `;
  }

  document.getElementById("dynamic").innerHTML = html;
}

renderForm();

// SAVE
async function save() {
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;

  let data = {};

  if (type === "workout") {
    data = {
      workout_type: document.getElementById("workout_type").value,
      location: document.getElementById("location").value,
      duration: document.getElementById("duration").value,
      intensity: document.getElementById("intensity").value
    };
  }

  if (type === "bible") {
    data = {
      duration: document.getElementById("duration").value,
      notes: document.getElementById("notes").value
    };
  }

  if (type === "practice") {
    data = {
      practice_type: document.getElementById("practice_type").value,
      notes: document.getElementById("notes").value
    };
  }

  if (type === "test") {
    data = {
      test_name: document.getElementById("test_name").value,
      result: document.getElementById("result").value,
      equipment: document.getElementById("equipment").value
    };
  }

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type: type,
    category: type,
    data: data,
    created_at: date || new Date()
  }]);

  alert("Saved ✅");
  loadHistory();
}

// LOAD HISTORY
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(row => {
    html += `
      <div class="small">
        ${row.user_email.split("@")[0]} - ${row.type} - ${new Date(row.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

// STATS
async function loadStats() {
  const { data } = await supabase.from("logs").select("*");

  const workouts = data.filter(d => d.type === "workout").length;
  const bible = data.filter(d => d.type === "bible").length;

  document.getElementById("stats").innerText =
    `Workouts: ${workouts} | Bible: ${bible}`;
}

// INIT
loadUser();
</script>

</body>
</html>
