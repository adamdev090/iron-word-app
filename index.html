<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron & Word</title>

<!-- =========================
  SUPABASE IMPORT (modern way)
========================= -->
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/*
=========================================
🔐 CONFIGURATION (your backend connection)
=========================================
*/
const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

/*
=========================================
👥 ALLOWED USERS (SECURITY LAYER)
=========================================
We will re-enable this later after debugging
*/
const ALLOWED_USERS = [
  "adamhlavka@gmail.com",
  "zmudariel@gmail.com"
].map(e => e.toLowerCase());

let currentUser = null;

/*
=========================================
🔑 LOGIN FUNCTION
=========================================
Redirects user to Google login
*/
window.login = async () => {
  console.log("Login clicked");

  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/iron-word-app/"
    }
  });
};

/*
=========================================
🚪 LOGOUT FUNCTION
=========================================
Clears session and reloads app
*/
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/*
=========================================
🚀 INIT FUNCTION (runs on page load)
=========================================
This is the MOST IMPORTANT part of the app
*/
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  console.log("SESSION:", session);

  if (!session) {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  const user = session.user;

  console.log("USER:", user);

  currentUser = user;

  const name =
    user.user_metadata.full_name?.split(" ")[0] || "User";

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText = "Welcome " + name;

  renderForm();
  loadHistory();
}

/*
=========================================
🧾 FORM RENDERING (dynamic inputs)
=========================================
Changes inputs based on selected type
*/
function renderForm() {
  const type = document.getElementById("type").value;
  let html = "";

  if (type === "workout") {
    html = `
      <select id="category">
        <option>Kettlebell</option>
        <option>Dumbbell + Barbell</option>
        <option>Running</option>
      </select>

      <input id="duration" placeholder="Duration (min)">
      <input id="intensity" placeholder="Intensity (1-10)">
    `;
  }

  if (type === "bible") {
    html = `
      <input id="duration" placeholder="Minutes">
      <input id="notes" placeholder="Notes">
    `;
  }

  if (type === "practice") {
    html = `
      <select id="category">
        <option>Cold Exposure</option>
        <option>Sauna</option>
      </select>

      <input id="notes" placeholder="Details">
    `;
  }

  document.getElementById("dynamic").innerHTML = html;
}

window.renderForm = renderForm;

/*
=========================================
💾 SAVE DATA TO DATABASE
=========================================
*/
window.save = async () => {
  const type = document.getElementById("type").value;

  let data = {};

  if (type === "workout") {
    data = {
      duration: document.getElementById("duration").value,
      intensity: document.getElementById("intensity").value
    };
  }

  if (type === "bible" || type === "practice") {
    data = {
      notes: document.getElementById("notes").value
    };
  }

  console.log("Saving data:", data);

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type,
    category: type,
    data,
    created_at: new Date(),
    deleted: false
  }]);

  alert("Saved ✅");
  loadHistory();
};

/*
=========================================
📜 LOAD HISTORY FROM DATABASE
=========================================
*/
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  console.log("Loaded logs:", data);

  let html = "";

  data.forEach(row => {
    html += `
      <div style="margin:8px;">
        ${row.user_email} · ${row.type}
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

window.onload = init;
</script>

<!-- =========================
  STYLING (UI look)
========================= -->
<style>
body {
  font-family: Arial;
  background: #f6f6f2;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  border-radius: 14px;
  max-width: 420px;
}

button {
  background: #7a7f5a;
  color: white;
  border: none;
  padding: 14px;
  margin: 10px;
  width: 90%;
  border-radius: 10px;
}

input, select {
  padding: 10px;
  margin: 6px;
  width: 90%;
}
</style>
</head>

<body>

<h1>Iron & Word</h1>

<!-- LOGIN SECTION -->
<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <div class="card">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Record Session</h3>

    <select id="type" onchange="renderForm()">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
      <option value="practice">Personal Practices</option>
    </select>

    <div id="dynamic"></div>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

</body>
</html>
