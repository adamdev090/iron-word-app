<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Iron & Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f0ece2;
    --surface: #faf8f2;
    --surface2: #e8e2d4;
    --border: #ddd8c8;
    --text: #3a3828;
    --text2: #6b6650;
    --text3: #a09880;
    --olive: #4a5a38;
    --olive2: #5a6e46;
    --olive-light: rgba(74,90,56,0.1);
    --gold: #c9a84c;
    --gold-light: rgba(201,168,76,0.12);
    --green: #4a7055;
    --blue: #3d5f75;
    --red: #7a4040;
    --tab-h: 68px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --r: 14px;
    --r-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LOGO SVG ── */
  .logo-mark {
    display: block;
  }

  /* ── AUTH ── */
  #auth-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 32px;
    background: var(--bg);
  }

  .auth-logo-wrap { margin-bottom: 16px; }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--olive);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-align: center;
  }

  .auth-tagline {
    font-size: 12px;
    font-weight: 300;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 52px;
    text-align: center;
  }

  .btn-google {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 14px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .btn-google:active { transform: scale(0.97); }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ── APP ── */
  #app { display: none; padding-bottom: calc(var(--tab-h) + var(--safe-bottom)); }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(240,236,226,0.94);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: calc(var(--safe-top) + 8px) 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .topbar-logo { display: flex; align-items: center; gap: 10px; }
  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 500;
    color: var(--olive); letter-spacing: -0.2px;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
    transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--surface2); }

  /* ── VIEWING BANNER ── */
  .viewing-banner {
    display: none;
    background: var(--olive);
    color: white;
    padding: 8px 16px;
    font-size: 12px; font-weight: 500;
    position: sticky; top: 0; z-index: 99;
  }
  .viewing-banner.show { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .viewing-banner button {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white; border-radius: 6px;
    padding: 3px 10px; font-size: 11px;
    font-family: 'Inter', sans-serif; cursor: pointer;
  }

  /* ── PAGES ── */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px; margin-top: 24px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border-radius: var(--r);
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.03);
    margin-bottom: 12px;
  }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .stat-card {
    background: var(--surface);
    border-radius: var(--r);
    padding: 18px 16px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute;
    bottom: -16px; right: -16px;
    width: 64px; height: 64px;
    border-radius: 50%; opacity: 0.06;
  }
  .stat-card.workout::after { background: var(--olive); }
  .stat-card.bible::after { background: var(--gold); }
  .stat-card.cold::after { background: var(--blue); }
  .stat-card.sauna::after { background: var(--red); }

  .stat-icon { font-size: 18px; margin-bottom: 8px; display: block; }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 40px; font-weight: 400;
    line-height: 1; color: var(--text); letter-spacing: -1px;
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 300; }

  .stat-card.wide {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .stat-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }
  .stat-ytd { text-align: right; }
  .stat-ytd .stat-number { font-size: 26px; color: var(--text2); }

  /* ── PERIOD PICKER ── */
  .period-picker {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 1px;
  }
  .period-picker::-webkit-scrollbar { display: none; }

  .period-btn {
    flex-shrink: 0; padding: 6px 14px;
    border-radius: 20px; border: 1.5px solid var(--border);
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 400; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .period-btn.active { background: var(--olive); border-color: var(--olive); color: white; }

  /* ── HISTORY ITEMS ── */
  .history-item {
    padding: 12px 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .history-item:last-child { border-bottom: none; padding-bottom: 0; }
  .history-item:first-child { padding-top: 0; }

  .history-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 1px;
  }
  .history-icon.workout { background: rgba(74,90,56,0.1); }
  .history-icon.bible { background: rgba(201,168,76,0.12); }
  .history-icon.cold { background: rgba(61,95,117,0.1); }
  .history-icon.sauna { background: rgba(122,64,64,0.1); }

  .history-body { flex: 1; min-width: 0; }
  .history-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .history-meta { font-size: 12px; color: var(--text3); margin-top: 2px; font-weight: 300; }
  .history-notes { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; line-height: 1.4; }

  .history-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .history-time { font-size: 11px; color: var(--text3); font-weight: 300; }
  .delete-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 4px; transition: color 0.15s; }
  .delete-btn:active { color: var(--red); }

  /* ── LOG TYPE GRID ── */
  .log-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }

  .log-type-btn {
    padding: 18px 12px; border-radius: var(--r);
    border: 1.5px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .log-type-btn .log-icon { font-size: 22px; }
  .log-type-btn .log-name { font-size: 12px; font-weight: 500; color: var(--text2); }
  .log-type-btn.selected {
    border-color: var(--olive); background: var(--olive-light);
    box-shadow: 0 0 0 1px var(--olive);
  }
  .log-type-btn.selected .log-name { color: var(--olive); }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 10px; font-weight: 500; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: block;
  }
  .form-input {
    width: 100%; padding: 13px 14px;
    border-radius: var(--r-sm); border: 1.5px solid var(--border);
    background: var(--bg); font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 400; color: var(--text);
    outline: none; transition: border-color 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--olive); background: var(--surface); }
  .form-input::placeholder { color: var(--text3); }

  /* ── CHIPS ── */
  .chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    padding: 8px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--bg);
    font-family: 'Inter', sans-serif; font-size: 13px;
    font-weight: 400; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .chip.selected { background: var(--olive); border-color: var(--olive); color: white; }

  /* ── SLIDER ── */
  .slider-value {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 400; color: var(--olive);
    text-align: center; margin-bottom: 8px; letter-spacing: -1px;
  }
  input[type=range] {
    width: 100%; height: 3px; border-radius: 2px;
    background: var(--border); outline: none;
    -webkit-appearance: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    border-radius: 50%; background: var(--olive);
    box-shadow: 0 2px 8px rgba(74,90,56,0.3);
  }
  .slider-labels {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text3); margin-top: 8px;
    font-weight: 300; letter-spacing: 0.5px;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%; padding: 15px; border-radius: 50px;
    border: none; background: var(--olive); color: white;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; margin-top: 8px;
    box-shadow: 0 4px 16px rgba(74,90,56,0.25); letter-spacing: 0.2px;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── PROFILE ── */
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--olive);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 28px; color: white;
    margin-bottom: 14px; box-shadow: 0 4px 20px rgba(74,90,56,0.2);
  }
  .profile-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 4px; }
  .profile-email { font-size: 13px; color: var(--text3); margin-bottom: 24px; font-weight: 300; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    background: rgba(250,248,242,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-start; padding-top: 8px; z-index: 200;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 4px 0; cursor: pointer; border: none; background: none;
  }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; }
  .nav-item.active .nav-label { color: var(--olive); }

  .nav-fab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; margin-top: -18px; cursor: pointer; border: none; background: none; padding: 0;
  }
  .fab-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--olive);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 24px; font-weight: 300;
    box-shadow: 0 4px 16px rgba(74,90,56,0.35);
    transition: transform 0.15s; line-height: 1; padding-bottom: 1px;
  }
  .nav-fab:active .fab-circle { transform: scale(0.92); }
  .nav-fab .nav-label { color: var(--text3); }
  .nav-fab.active .nav-label { color: var(--olive); }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 28px 16px; color: var(--text3); }
  .empty-text { font-size: 13px; font-weight: 300; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
    left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--text); color: white;
    padding: 11px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500; opacity: 0;
    transition: all 0.25s; z-index: 400;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (min-width: 768px) {
    #app { max-width: 480px; margin: 0 auto; }
    .bottom-nav, .topbar, .viewing-banner {
      max-width: 480px; left: 50%; transform: translateX(-50%); width: 100%;
    }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo-wrap">
    <!-- Logo: kettlebell sitting on open book -->
    <svg width="90" height="90" viewBox="0 0 90 90" fill="none" class="logo-mark">
      <!-- Open book bottom -->
      <path d="M10 64 Q10 76 45 76 Q80 76 80 64 L80 58 Q80 50 45 50 Q10 50 10 58 Z" fill="#4a5a38"/>
      <!-- Book spine -->
      <line x1="45" y1="50" x2="45" y2="76" stroke="#f0ece2" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Book text lines left page -->
      <line x1="16" y1="58" x2="41" y2="58" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      <line x1="16" y1="64" x2="41" y2="64" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      <line x1="16" y1="70" x2="34" y2="70" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
      <!-- Book text lines right page -->
      <line x1="74" y1="58" x2="49" y2="58" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      <line x1="74" y1="64" x2="49" y2="64" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      <line x1="74" y1="70" x2="56" y2="70" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
      <!-- Kettlebell body -->
      <circle cx="45" cy="30" r="17" fill="#4a5a38"/>
      <!-- Kettlebell handle arc -->
      <path d="M35 23 Q35 10 45 10 Q55 10 55 23" fill="none" stroke="#4a5a38" stroke-width="4" stroke-linecap="round"/>
      <!-- Handle flat base -->
      <rect x="33" y="21" width="24" height="5" rx="2.5" fill="#4a5a38"/>
    </svg>
  </div>
  <div class="auth-title">Iron & Word</div>
  <div class="auth-tagline">Forge the body · Feed the soul</div>
  <button class="btn-google" onclick="login()">
    <svg viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
</div>

<!-- VIEWING BANNER -->
<div class="viewing-banner" id="viewing-banner">
  <span>Viewing as Ariel</span>
  <button onclick="switchBack()">← Switch back</button>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <!-- Small logo in topbar -->
      <svg width="28" height="28" viewBox="0 0 90 90" fill="none">
        <path d="M10 64 Q10 76 45 76 Q80 76 80 64 L80 58 Q80 50 45 50 Q10 50 10 58 Z" fill="#4a5a38"/>
        <line x1="45" y1="50" x2="45" y2="76" stroke="#f0ece2" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="58" x2="41" y2="58" stroke="#f0ece2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="16" y1="64" x2="41" y2="64" stroke="#f0ece2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="74" y1="58" x2="49" y2="58" stroke="#f0ece2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="74" y1="64" x2="49" y2="64" stroke="#f0ece2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <circle cx="45" cy="30" r="17" fill="#4a5a38"/>
        <path d="M35 23 Q35 10 45 10 Q55 10 55 23" fill="none" stroke="#4a5a38" stroke-width="4" stroke-linecap="round"/>
        <rect x="33" y="21" width="24" height="5" rx="2.5" fill="#4a5a38"/>
      </svg>
      <div class="topbar-title" id="topbar-title">Iron & Word</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="switch-btn" onclick="toggleView()" style="display:none" title="Switch view">⇄</button>
      <button class="icon-btn" onclick="showPage('profile')">○</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="page active" id="page-home">
    <div class="period-picker" id="period-picker">
      <button class="period-btn active" onclick="setPeriod('month',this)">This Month</button>
      <button class="period-btn" onclick="setPeriod('week',this)">This Week</button>
      <button class="period-btn" onclick="setPeriod('year',this)">This Year</button>
      <button class="period-btn" onclick="setPeriod('all',this)">All Time</button>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-label">Recent Activity</div>
    <div class="card"><div id="recent-list"></div></div>
  </div>

  <!-- LOG -->
  <div class="page" id="page-log">
    <div class="section-label">What are you logging?</div>
    <div class="log-type-grid">
      <button class="log-type-btn" onclick="selectLogType('workout')" id="lt-workout">
        <span class="log-icon">🏋️</span><span class="log-name">Workout</span>
      </button>
      <button class="log-type-btn" onclick="selectLogType('bible')" id="lt-bible">
        <span class="log-icon">📖</span><span class="log-name">Bible Reading</span>
      </button>
      <button class="log-type-btn" onclick="selectLogType('cold')" id="lt-cold" style="display:none">
        <span class="log-icon">🧊</span><span class="log-name">Cold Exposure</span>
      </button>
      <button class="log-type-btn" onclick="selectLogType('sauna')" id="lt-sauna" style="display:none">
        <span class="log-icon">🔥</span><span class="log-name">Sauna</span>
      </button>
    </div>
    <div id="log-form-area"></div>

  <!-- HISTORY -->

    <div class="period-picker" id="hist-period-picker">
      <button class="period-btn active" onclick="setHistoryPeriod('month',this)">This Month</button>
      <button class="period-btn" onclick="setHistoryPeriod('week',this)">This Week</button>
      <button class="period-btn" onclick="setHistoryPeriod('year',this)">This Year</button>
      <button class="period-btn" onclick="setHistoryPeriod('all',this)">All Time</button>
    </div>
    <div class="section-label">Workouts</div>
    <div class="card"><div id="hist-workout"></div></div>
    <div class="section-label">Bible Readings</div>
    <div class="card"><div id="hist-bible"></div></div>
    <div id="private-history-section" style="display:none">
      <div class="section-label">Cold Exposure</div>
      <div class="card"><div id="hist-cold"></div></div>
      <div class="section-label">Sauna</div>
      <div class="card"><div id="hist-sauna"></div></div>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page" id="page-profile">
    <div class="card" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 20px">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
      <button class="btn-primary" style="max-width:180px;margin-top:0" onclick="logout()">Sign Out</button>
    </div>
    <div class="section-label">About</div>
    <div class="card">
      <div style="font-size:13px;color:var(--text2);font-weight:300">
        <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
          <span>App</span><span style="color:var(--text);font-weight:400">Iron & Word</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:9px 0">
          <span>Version</span><span style="color:var(--text);font-weight:400">3.1</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="showPage('home')" id="nav-home">
    <span class="nav-icon">⬜</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" onclick="showPage('history')" id="nav-history">
    <span class="nav-icon">≡</span>
    <span class="nav-label">History</span>
  </button>
  <button class="nav-fab" onclick="showPage('log')" id="nav-log">
    <div class="fab-circle">+</div>
    <span class="nav-label">Log</span>
  </button>
  <button class="nav-item" onclick="showPage('profile')" id="nav-profile">
    <span class="nav-icon">○</span>
    <span class="nav-label">Profile</span>
  </button>
  <button class="nav-item" style="visibility:hidden;pointer-events:none">
    <span class="nav-icon"> </span><span class="nav-label"> </span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

const ALLOWED = ["adamhlavka@gmail.com", "zmudariel@gmail.com"];
const ADAM = "adamhlavka@gmail.com";
const NETLIFY_URL = "https://ironandword.netlify.app";

let currentUser = null, currentUserName = "", viewingAs = "";
let currentPeriod = "month", historyPeriod = "month";
let selectedLogType = null, logFormData = {};

/* ── AUTH ── */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: NETLIFY_URL, queryParams: { prompt: "select_account" } }
  });
};

window.logout = async () => { await supabase.auth.signOut(); location.reload(); };

async function init() {
  const h = window.location.hash, s = window.location.search;
  if (h || s.includes("code=") || s.includes("access_token")) {
    try { await supabase.auth.exchangeCodeForSession(window.location.href); } catch(e) {}
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { document.getElementById("auth-screen").style.display = "flex"; return; }

  const email = session.user.email.toLowerCase();
  if (!ALLOWED.includes(email)) {
    await supabase.auth.signOut();
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Inter',sans-serif">🔒 Private App</div>`;
    return;
  }

  currentUser = session.user;
  currentUserName = email === ADAM ? "adam" : "ariel";
  viewingAs = currentUserName;

  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  if (currentUserName === "adam") {
    document.getElementById("switch-btn").style.display = "flex";
    document.getElementById("lt-cold").style.display = "flex";
    document.getElementById("lt-sauna").style.display = "flex";
    document.getElementById("private-history-section").style.display = "block";
  }

  document.getElementById("profile-avatar").textContent = currentUserName === "adam" ? "A" : "Ar";
  document.getElementById("profile-name").textContent = currentUserName === "adam" ? "Adam Hlávka" : "Ariel";
  document.getElementById("profile-email").textContent = email;

  updateTopbar(); loadDashboard(); loadHistory();
}

/* ── VIEW ── */
window.toggleView = () => {
  if (currentUserName !== "adam") return;
  viewingAs = viewingAs === "adam" ? "ariel" : "adam";
  updateTopbar(); loadDashboard(); loadHistory();
};
window.switchBack = () => { viewingAs = "adam"; updateTopbar(); loadDashboard(); loadHistory(); };

function updateTopbar() {
  const isAriel = viewingAs === "ariel";
  document.getElementById("viewing-banner").classList.toggle("show", isAriel);
  document.getElementById("topbar-title").textContent = isAriel ? "Ariel's View" : "Iron & Word";
}

/* ── NAV ── */
window.showPage = (page) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-item, .nav-fab").forEach(n => n.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  const el = document.getElementById("nav-" + page);
  if (el) el.classList.add("active");
  if (page === "log") { selectedLogType = null; renderLogTypeGrid(); document.getElementById("log-form-area").innerHTML = ""; }
  if (page === "home") loadDashboard();
  if (page === "history") loadHistory();
};

/* ── DATES ── */
function getPeriodRange(p) {
  const now = new Date(); let start;
  if (p === "week") { start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0); }
  else if (p === "month") start = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (p === "year") start = new Date(now.getFullYear(), 0, 1);
  else start = new Date(2020, 0, 1);
  return { start, end: now };
}
function filterByPeriod(data, p) {
  const { start, end } = getPeriodRange(p);
  return data.filter(r => { const d = new Date(r.created_at); return d >= start && d <= end; });
}

/* ── DASHBOARD ── */
window.setPeriod = (p, btn) => {
  currentPeriod = p;
  document.querySelectorAll("#period-picker .period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active"); loadDashboard();
};

async function loadDashboard() {
  const isPrivate = viewingAs === "adam" && currentUserName === "adam";
  const { data: all } = await supabase.from("logs").select("*").eq("deleted", false).eq("owner", viewingAs);
  if (!all) return;

  const filtered = filterByPeriod(all, currentPeriod);
  const ytd = filterByPeriod(all, "year");
  const lbl = { month:"This Month", week:"This Week", year:"This Year", all:"All Time" }[currentPeriod];

  const w = filtered.filter(r=>r.type==="workout"), b = filtered.filter(r=>r.type==="bible");
  const wY = ytd.filter(r=>r.type==="workout"), bY = ytd.filter(r=>r.type==="bible");

  let html = `
    <div class="stat-card workout wide">
      <div><span class="stat-icon">🏋️</span><div class="stat-number">${w.length}</div><div class="stat-label">Workouts · ${lbl}</div></div>
      <div class="stat-divider"></div>
      <div class="stat-ytd"><div class="stat-number">${wY.length}</div><div class="stat-label">Year to date</div></div>
    </div>
    <div class="stat-card bible wide">
      <div><span class="stat-icon">📖</span><div class="stat-number">${b.length}</div><div class="stat-label">Bible Readings · ${lbl}</div></div>
      <div class="stat-divider"></div>
      <div class="stat-ytd"><div class="stat-number">${bY.length}</div><div class="stat-label">Year to date</div></div>
    </div>`;

  if (isPrivate) {
    const c = filtered.filter(r=>r.type==="cold"), s = filtered.filter(r=>r.type==="sauna");
    html += `
      <div class="stat-card cold"><span class="stat-icon">🧊</span><div class="stat-number">${c.length}</div><div class="stat-label">Cold Sessions</div></div>
      <div class="stat-card sauna"><span class="stat-icon">🔥</span><div class="stat-number">${s.length}</div><div class="stat-label">Sauna Sessions</div></div>`;
  }

  document.getElementById("stats-grid").innerHTML = html;
  const recent = [...all].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
  document.getElementById("recent-list").innerHTML = recent.length
    ? recent.map(r=>itemHTML(r,false)).join("")
    : `<div class="empty"><div class="empty-text">No activity yet</div></div>`;
}

/* ── HISTORY ── */
window.setHistoryPeriod = (p, btn) => {
  historyPeriod = p;
  document.querySelectorAll("#hist-period-picker .period-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active"); loadHistory();
};

async function loadHistory() {
  const isPrivate = viewingAs === "adam" && currentUserName === "adam";
  const { data: all } = await supabase.from("logs").select("*").eq("deleted",false).eq("owner",viewingAs).order("created_at",{ascending:false});
  if (!all) return;
  const filtered = filterByPeriod(all, historyPeriod);
  const types = isPrivate ? ["workout","bible","cold","sauna"] : ["workout","bible"];
  types.forEach(type => {
    const el = document.getElementById("hist-"+type);
    if (!el) return;
    const items = filtered.filter(r=>r.type===type);
    el.innerHTML = items.length ? items.map(r=>itemHTML(r,true)).join("") : `<div class="empty" style="padding:20px 0"><div class="empty-text">Nothing logged yet</div></div>`;
  });
}

function itemHTML(row, showDelete) {
  const d = new Date(row.created_at);
  const date = d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  const time = d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const icons = { workout:"🏋️", bible:"📖", cold:"🧊", sauna:"🔥" };
  let title="", meta="", notes="";

  if (row.type==="workout") {
    title = row.data?.workout_type || "Workout";
    meta = [row.data?.focus, row.data?.duration&&row.data.duration+" min", row.data?.intensity&&"Intensity "+row.data.intensity+"/10", row.data?.time_of_day].filter(Boolean).join(" · ");
    notes = row.data?.notes||"";
  } else if (row.type==="bible") {
    title = row.data?.passage||"Bible Reading";
    meta = row.data?.duration ? row.data.duration+" min" : "";
    notes = row.data?.notes||"";
  } else if (row.type==="cold") {
    title = row.data?.method||"Cold Exposure";
    meta = [row.data?.duration&&row.data.duration+" min", row.data?.temp&&row.data.temp+"°C", row.data?.place].filter(Boolean).join(" · ");
    notes = row.data?.notes||"";
  } else if (row.type==="sauna") {
    title = row.data?.sauna_type||"Sauna";
    meta = [row.data?.location, row.data?.duration&&row.data.duration+" min", row.data?.cycles&&row.data.cycles+" cycles"].filter(Boolean).join(" · ");
    notes = row.data?.notes||"";
  }

  const canDelete = row.user_email===currentUser.email || currentUserName==="adam";
  return `<div class="history-item" id="entry-${row.id}">
    <div class="history-icon ${row.type}">${icons[row.type]||"○"}</div>
    <div class="history-body">
      <div class="history-title">${title}</div>
      ${meta?`<div class="history-meta">${meta}</div>`:""}
      ${notes?`<div class="history-notes">${notes}</div>`:""}
    </div>
    <div class="history-right">
      <div class="history-time">${date} · ${time}</div>
      ${showDelete&&canDelete?`<button class="delete-btn" onclick="deleteEntry(${row.id})">✕</button>`:""}
    </div>
  </div>`;
}

/* ── DELETE ── */
window.deleteEntry = async (id) => {
  if (!confirm("Delete this entry?")) return;
  const { data: row } = await supabase.from("logs").select("owner,user_email").eq("id",id).single();
  if (!row) return;
  if (row.user_email!==currentUser.email && currentUserName!=="adam") { showToast("Can't delete this"); return; }
  await supabase.from("logs").update({deleted:true}).eq("id",id);
  document.getElementById("entry-"+id)?.remove();
  showToast("Deleted"); loadDashboard();
};

/* ── LOG ── */
window.selectLogType = (type) => { selectedLogType=type; renderLogTypeGrid(); renderLogForm(type); };

function renderLogTypeGrid() {
  ["workout","bible","cold","sauna"].forEach(t => {
    const el = document.getElementById("lt-"+t);
    if (el) el.classList.toggle("selected", t===selectedLogType);
  });
}

function renderLogForm(type) {
  const forms = { workout:workoutForm, bible:bibleForm, cold:coldForm, sauna:saunaForm };
  document.getElementById("log-form-area").innerHTML = forms[type]?forms[type]():"";
  logFormData = {};
  if (document.getElementById("slider-intensity")) logFormData.intensity = 5;
}

const ch = (opts,field) => opts.map(v=>`<button class="chip" onclick="toggleChip(this,'${field}','${v}',true)">${v}</button>`).join("");
const timeChips = () => [["🌅","Morning"],["☀️","Noon"],["🌤","Afternoon"],["🌙","Evening"]].map(([e,v])=>`<button class="chip" onclick="toggleChip(this,'time_of_day','${v}',true)">${e} ${v}</button>`).join("");
const slider = (field,lo,mid,hi) => `<div class="slider-value" id="slider-val-${field}">5</div><input type="range" min="1" max="10" value="5" id="slider-${field}" oninput="updateSlider('${field}',this.value)"><div class="slider-labels"><span>${lo}</span><span>${mid}</span><span>${hi}</span></div>`;

function workoutForm() { return `
  <div class="section-label" style="margin-top:20px">Type of Workout</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Kettlebell","Weightlifting","Running","Swimming","Hiking"],"workout_type")}</div></div>
  <div class="section-label">Focus</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Cardio","Strength","Both"],"focus")}</div></div>
  <div class="section-label">Time of Day</div>
  <div class="card" style="padding:16px"><div class="chip-group">${timeChips()}</div></div>
  <div class="section-label">Duration & Intensity</div>
  <div class="card">
    <div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-input" type="number" min="1" max="300" placeholder="45" oninput="setField('duration',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Intensity</label>${slider("intensity","Easy","Moderate","Max")}</div>
  </div>
  <div class="section-label">Notes</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="3" placeholder="How did it go?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Workout</button><div style="height:16px"></div>`; }

function bibleForm() { return `
  <div class="section-label" style="margin-top:20px">Passage</div>
  <div class="card" style="padding:16px"><input class="form-input" placeholder="e.g. Psalm 23, John 3:16–21" oninput="setField('passage',this.value)"></div>
  <div class="section-label">Duration (minutes)</div>
  <div class="card" style="padding:16px"><input class="form-input" type="number" min="1" placeholder="20" oninput="setField('duration',this.value)"></div>
  <div class="section-label">Notes & Reflections</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="4" placeholder="What stood out to you?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Reading</button><div style="height:16px"></div>`; }

function coldForm() { return `
  <div class="section-label" style="margin-top:20px">Method</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Cold Shower","Cold Plunge","Ice Bath"],"method")}</div></div>
  <div class="section-label">Place</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Home","Gym","Nature","Spa"],"place")}</div></div>
  <div class="section-label">Duration & Temperature</div>
  <div class="card">
    <div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-input" type="number" min="1" placeholder="5" oninput="setField('duration',this.value)"></div>
    <div class="form-group"><label class="form-label">Water Temperature (°C)</label><input class="form-input" type="number" placeholder="12" oninput="setField('temp',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Intensity</label>${slider("intensity","Manageable","Hard","Brutal")}</div>
  </div>
  <div class="section-label">Notes</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="3" placeholder="How did it feel?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Cold Session</button><div style="height:16px"></div>`; }

function saunaForm() { return `
  <div class="section-label" style="margin-top:20px">Type</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Finnish","Infrared"],"sauna_type")}</div></div>
  <div class="section-label">Location</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Home","Gym","Spa","Public"],"location")}</div></div>
  <div class="section-label">Duration & Cycles</div>
  <div class="card">
    <div class="form-group"><label class="form-label">Total Duration (minutes)</label><input class="form-input" type="number" min="1" placeholder="60" oninput="setField('duration',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Number of Cycles</label><input class="form-input" type="number" min="1" placeholder="3" oninput="setField('cycles',this.value)"></div>
  </div>
  <div class="section-label">Notes</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="3" placeholder="How was it?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Sauna Session</button><div style="height:16px"></div>`; }

/* ── HELPERS ── */
window.toggleChip = (el,field,value,exclusive) => {
  if (exclusive) el.closest(".chip-group").querySelectorAll(".chip").forEach(c=>c.classList.remove("selected"));
  el.classList.toggle("selected");
  if (el.classList.contains("selected")) logFormData[field]=value; else delete logFormData[field];
};
window.setField = (field,value) => { logFormData[field]=value; };
window.updateSlider = (field,value) => { document.getElementById("slider-val-"+field).textContent=value; logFormData[field]=parseInt(value); };

/* ── SAVE ── */
window.saveEntry = async () => {
  if (!selectedLogType) return;
  if (selectedLogType==="workout"&&!logFormData.workout_type) { showToast("Select a workout type"); return; }
  if (selectedLogType==="bible"&&!logFormData.passage?.trim()) { showToast("Enter a Bible passage"); return; }
  if (selectedLogType==="cold"&&!logFormData.method) { showToast("Select a method"); return; }
  if (selectedLogType==="sauna"&&!logFormData.sauna_type) { showToast("Select sauna type"); return; }

  const btn = document.querySelector("#page-log .btn-primary");
  if (btn) { btn.disabled=true; btn.textContent="Saving…"; }

  const owner = (selectedLogType==="cold"||selectedLogType==="sauna") ? "adam" : viewingAs;
  const { error } = await supabase.from("logs").insert([{
    user_id:currentUser.id, user_email:currentUser.email,
    type:selectedLogType, owner, data:{...logFormData}, deleted:false
  }]);

  if (error) { showToast("Error — try again"); if(btn){btn.disabled=false;btn.textContent="Save";} return; }
  showToast("✓ Saved");
  setTimeout(()=>showPage("home"), 500);
};

/* ── TOAST ── */
window.showToast = (msg) => {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
};

window.onload = init;
</script>
