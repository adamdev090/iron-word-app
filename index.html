<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron & Word</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* =========================
   🔐 SUPABASE CONFIG
========================= */
const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

/* =========================
   👥 ALLOWED USERS
========================= */
const ALLOWED_USERS = [
  "adamhlavka@gmail.com",
  "zmudariel@gmail.com"
].map(e => e.toLowerCase());

let currentUser = null;

/* =========================
   🔑 LOGIN (FIXED LOOP)
========================= */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/iron-word-app/",
      queryParams: {
        prompt: "select_account" // 🔥 KEY FIX
      }
    }
  });
};

/* =========================
   🚪 LOGOUT
========================= */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* =========================
   🚀 INIT
========================= */
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  const user = session.user;
  const email = user.email?.toLowerCase();

  /* =========================
     🔐 ACCESS CONTROL
  ========================= */
  if (!ALLOWED_USERS.includes(email)) {
    document.body.innerHTML = `
      <div style="
        text-align:center;
        margin-top:80px;
        font-family:-apple-system,sans-serif;
      ">
        <h2>Private App 🔒</h2>

        <p style="color:#666;">
          You are signed in as:<br><strong>${email}</strong>
        </p>

        <button onclick="logout()" style="
          margin-top:30px;
          padding:14px 20px;
          background:#7a7f5a;
          color:white;
          border:none;
          border-radius:10px;
          font-size:16px;
        ">
          Try another account
        </button>
      </div>
    `;
    return;
  }

  currentUser = user;

  const name =
    user.user_metadata.full_name?.split(" ")[0] || "User";

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Welcome " + name;

  renderForm();
  loadHistory();
}

/* =========================
   🧾 FORM
========================= */
function renderForm() {
  const type = document.getElementById("type").value;

  let html = `<input id="date" type="datetime-local">`;

  if (type === "workout") {
    html += `
      <select id="category">
        <option>Kettlebell</option>
        <option>Dumbbell + Barbell</option>
        <option>Running</option>
        <option>Swimming</option>
        <option>Hiking</option>
      </select>

      <select id="location">
        <option>Home</option>
        <option>Gym</option>
        <option>Hotel</option>
        <option>Work</option>
      </select>

      <input id="duration" placeholder="Duration (minutes)">
      <input id="intensity" placeholder="Intensity (1-10)">
    `;
  }

  if (type === "bible") {
    html += `
      <input id="duration" placeholder="Minutes">
      <input id="notes" placeholder="What did you read?">
    `;
  }

  if (type === "practice") {
    html += `
      <select id="category">
        <option>Cold Exposure</option>
        <option>Sauna</option>
        <option>Reading</option>
        <option>Friendship</option>
        <option>Marriage</option>
        <option>Kids</option>
      </select>

      <input id="notes" placeholder="Details">
    `;
  }

  document.getElementById("dynamic").innerHTML = html;

  const now = new Date().toISOString().slice(0,16);
  document.getElementById("date").value = now;
}

window.renderForm = renderForm;

/* =========================
   💾 SAVE
========================= */
window.save = async () => {
  const type = document.getElementById("type").value;
  const selectedDate = document.getElementById("date").value;

  let data = {};

  if (type === "workout") {
    data = {
      category: document.getElementById("category").value,
      location: document.getElementById("location").value,
      duration: document.getElementById("duration").value,
      intensity: document.getElementById("intensity").value
    };
  }

  if (type === "bible" || type === "practice") {
    data = {
      category: document.getElementById("category")?.value,
      notes: document.getElementById("notes").value
    };
  }

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type,
    category: data.category || type,
    data,
    created_at: selectedDate,
    deleted: false
  }]);

  alert("Saved ✅");
  loadHistory();
};

/* =========================
   📜 HISTORY
========================= */
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(row => {
    const d = new Date(row.created_at);
    const date = d.toLocaleDateString();
    const time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    let details = "";

    if (row.type === "workout") {
      details = `
        ${row.data.category || ""} · ${row.data.location || ""}<br>
        ${row.data.duration || "-"} min · intensity ${row.data.intensity || "-"}
      `;
    }

    if (row.type === "bible") {
      details = `
        ${row.data.duration || "-"} min<br>
        ${row.data.notes || ""}
      `;
    }

    if (row.type === "practice") {
      details = `
        ${row.data.category || ""}<br>
        ${row.data.notes || ""}
      `;
    }

    html += `
      <div class="history-item">
        <div class="history-header">
          ${row.type} · ${date} ${time}
        </div>
        <div class="history-details">
          ${details}
        </div>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

window.onload = init;
</script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f4ef;
  text-align: center;
  padding: 20px;
  color: #2c2c2c;
}

.card {
  background: #ffffff;
  padding: 22px;
  margin: 16px auto;
  border-radius: 18px;
  max-width: 420px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

button {
  background: #7a7f5a;
  color: white;
  border: none;
  padding: 14px;
  margin-top: 12px;
  width: 100%;
  border-radius: 12px;
  font-size: 16px;
}

input, select {
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #e0e0dc;
  background: #fafaf7;
}

.history-item {
  text-align: left;
  padding: 14px 0;
  border-bottom: 1px solid #eee;
}

.history-header {
  font-weight: 600;
}

.history-details {
  color: #666;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>Iron & Word</h1>

<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" style="display:none;">

  <div class="card">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Record Session</h3>

    <select id="type" onchange="renderForm()">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
      <option value="practice">Personal Practices</option>
    </select>

    <div id="dynamic"></div>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

</body>
</html>
