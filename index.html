<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron & Word</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

const ALLOWED_USERS = [
  "adamhlavka@gmail.com",
  "zmudariel@gmail.com"
].map(e => e.toLowerCase());

let currentUser = null;
let historyExpanded = false;

/* LOGIN */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/iron-word-app/",
      queryParams: { prompt: "select_account" }
    }
  });
};

/* LOGOUT */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* INIT */
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("auth").style.display = "block";
    return;
  }

  const user = session.user;
  const email = user.email.toLowerCase();

  if (!ALLOWED_USERS.includes(email)) {
    document.body.innerHTML = `
      <div style="text-align:center;margin-top:80px;">
        <h2>Private App 🔒</h2>
        <p>${email}</p>
        <button onclick="logout()">Try another account</button>
      </div>
    `;
    return;
  }

  currentUser = user;

  const name = user.user_metadata.full_name?.split(" ")[0] || "User";

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Welcome " + name;

  renderForm();
  loadDashboard();
  loadHistory();
}

/* DASHBOARD */
async function loadDashboard() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false);

  const users = {};

  data.forEach(row => {
    if (!users[row.user_email]) {
      users[row.user_email] = { workout: 0, bible: 0 };
    }

    if (row.type === "workout") users[row.user_email].workout++;
    if (row.type === "bible") users[row.user_email].bible++;
  });

  let html = "";

  Object.keys(users).forEach(email => {
    const name = email.includes("adam") ? "Adam" : "Ariel";

    html += `
      <div class="dashboard-user">
        <strong>${name}</strong><br>
        🏋️ ${users[email].workout} workouts<br>
        📖 ${users[email].bible} readings
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = html;
}

/* FORM */
function renderForm() {
  const type = document.getElementById("type").value;

  let html = `<input id="date" type="datetime-local">`;

  if (type === "workout") {
    html += `
      <input id="duration" placeholder="Minutes">
      <input id="intensity" placeholder="Intensity">
    `;
  }

  if (type === "bible") {
    html += `
      <input id="duration" placeholder="Minutes">
      <input id="notes" placeholder="Reading">
    `;
  }

  document.getElementById("dynamic").innerHTML = html;

  document.getElementById("date").value =
    new Date().toISOString().slice(0,16);
}

window.renderForm = renderForm;

/* SAVE */
window.save = async () => {
  const type = document.getElementById("type").value;

  let data = {};

  if (type === "workout") {
    data = {
      duration: document.getElementById("duration").value,
      intensity: document.getElementById("intensity").value
    };
  }

  if (type === "bible") {
    data = {
      duration: document.getElementById("duration").value,
      notes: document.getElementById("notes").value
    };
  }

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type,
    data,
    created_at: document.getElementById("date").value,
    deleted: false
  }]);

  loadHistory();
  loadDashboard();
};

/* TOGGLE HISTORY */
window.toggleHistory = () => {
  historyExpanded = !historyExpanded;
  loadHistory();
};

/* HISTORY */
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  const list = historyExpanded ? data : data.slice(0, 3);

  let html = "";

  list.forEach(row => {
    const d = new Date(row.created_at);

    let details = "";

    if (row.type === "workout") {
      details = `${row.data.duration || "-"} min · intensity ${row.data.intensity || "-"}`;
    }

    if (row.type === "bible") {
      details = `${row.data.duration || "-"} min · ${row.data.notes || ""}`;
    }

    html += `
      <div class="history-item">
        <strong>${row.type}</strong>
        <div>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        <div class="muted">${details}</div>
      </div>
    `;
  });

  document.getElementById("historyList").innerHTML = html;

  document.getElementById("toggleText").innerText =
    historyExpanded ? "Hide ▲" : "Show more ▼";
}

window.onload = init;
</script>

<style>
body {
  font-family: -apple-system;
  background: #f4f4ef;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  max-width: 420px;
  border-radius: 15px;
}

button {
  background: #7a7f5a;
  color: white;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

.dashboard-user {
  margin-top: 10px;
  padding: 10px;
  background: #fafaf7;
  border-radius: 10px;
}

.history-item {
  text-align: left;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.muted {
  color: #666;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>Iron & Word</h1>

<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" style="display:none">

  <div class="card">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Dashboard</h3>
    <div id="dashboard"></div>
  </div>

  <div class="card">
    <h3>Record Session</h3>

    <select id="type" onchange="renderForm()">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
    </select>

    <div id="dynamic"></div>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3 onclick="toggleHistory()" style="cursor:pointer">
      History <span id="toggleText">Show more ▼</span>
    </h3>

    <div id="historyList"></div>
  </div>

</div>

</body>
</html>
