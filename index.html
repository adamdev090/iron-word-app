<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Iron & Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f0ece2;
    --surface: #faf8f2;
    --surface2: #e8e2d4;
    --border: #ddd8c8;
    --text: #3a3828;
    --text2: #6b6650;
    --text3: #a09880;
    --olive: #4a5a38;
    --olive-light: rgba(74,90,56,0.09);
    --gold: #c9a84c;
    --blue: #3d5f75;
    --red: #7a4040;
    --tab-h: 68px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --r: 14px;
    --r-sm: 10px;
    --max-w: 700px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── AUTH ── */
  #auth-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 32px;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(74,90,56,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
  }
  .auth-title {
    font-family: 'Lora', serif; font-size: 38px; font-weight: 500;
    color: var(--olive); letter-spacing: -0.5px; margin: 16px 0 6px; text-align: center;
  }
  .auth-tagline {
    font-size: 12px; font-weight: 300; color: var(--text3);
    letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 52px; text-align: center;
  }
  .btn-google {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 50px; padding: 14px 28px;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400;
    color: var(--text); cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .btn-google:active { transform: scale(0.97); }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ── APP ── */
  #app { display: none; padding-bottom: calc(var(--tab-h) + var(--safe-bottom)); }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(240,236,226,0.95);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: calc(var(--safe-top) + 6px) 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner {
    max-width: var(--max-w); margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .topbar-title {
    font-family: 'Lora', serif; font-size: 20px; font-weight: 500;
    color: var(--olive); letter-spacing: -0.2px;
  }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  /* ── PREVIEW TOGGLE (adam only) ── */
  .preview-toggle {
    display: none;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    align-items: center;
  }
  .preview-toggle.show { display: flex; }

  .preview-pill {
    padding: 5px 14px; border-radius: 16px; border: none;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500; color: var(--text3);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .preview-pill.active {
    background: var(--olive); color: white;
    box-shadow: 0 1px 4px rgba(74,90,56,0.3);
  }

  /* log-as badge */
  .log-badge {
    display: none; font-size: 11px; font-weight: 500;
    color: var(--olive); background: var(--olive-light);
    padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px;
  }
  .log-badge.show { display: block; }

  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.15s; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--surface2); }

  /* ── PAGES ── */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }
  .page-inner { max-width: var(--max-w); margin: 0 auto; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 24px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border-radius: var(--r); padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.03);
    margin-bottom: 12px;
  }

  /* ── PERIOD PICKER ── */
  .period-picker {
    display: flex; gap: 6px; margin-bottom: 14px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 1px;
  }
  .period-picker::-webkit-scrollbar { display: none; }
  .period-btn {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400;
    color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .period-btn.active { background: var(--olive); border-color: var(--olive); color: white; }

  /* ── COMPARISON GRID ── */
  .compare-header { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .compare-col {
    background: var(--surface); border-radius: var(--r);
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden;
  }
  .compare-col-head {
    background: var(--olive); color: white; padding: 10px 16px;
    font-family: 'Lora', serif; font-size: 15px; font-weight: 500;
    text-align: center;
  }
  .compare-col-head.muted { background: var(--surface2); color: var(--text2); }
  .compare-col-body { padding: 14px 16px; }
  .compare-stat {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .compare-stat:last-child { border-bottom: none; padding-bottom: 0; }
  .compare-stat-label { font-size: 12px; color: var(--text2); font-weight: 400; display: flex; align-items: center; gap: 6px; }
  .compare-stat-num { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.5px; }
  .compare-stat-num.leading { color: var(--olive); }
  .compare-stat-num.trailing { color: var(--text3); }

  /* ── YTD STRIP ── */
  .ytd-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .ytd-card {
    background: var(--surface); border-radius: var(--r); padding: 14px 16px;
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ytd-icon { font-size: 16px; margin-bottom: 4px; }
  .ytd-label { font-size: 11px; color: var(--text3); font-weight: 300; }
  .ytd-nums { display: flex; align-items: baseline; gap: 12px; }
  .ytd-num { text-align: center; }
  .ytd-num-val { font-family: 'Lora', serif; font-size: 28px; font-weight: 500; letter-spacing: -1px; line-height: 1; }
  .ytd-num-name { font-size: 10px; color: var(--text3); font-weight: 300; margin-top: 2px; }
  .ytd-divider { width: 1px; height: 28px; background: var(--border); }

  /* ── PRIVATE STRIP ── */
  .private-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .private-card {
    background: var(--surface); border-radius: var(--r); padding: 16px;
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .private-icon { font-size: 18px; margin-bottom: 6px; display: block; }
  .private-num { font-family: 'Lora', serif; font-size: 32px; font-weight: 500; letter-spacing: -1px; line-height: 1; }
  .private-label { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── SOLO STATS (Ariel view) ── */
  .solo-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .solo-card {
    background: var(--surface); border-radius: var(--r); padding: 18px 16px;
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    position: relative; overflow: hidden;
  }
  .solo-card::after {
    content: ''; position: absolute; bottom: -16px; right: -16px;
    width: 64px; height: 64px; border-radius: 50%; opacity: 0.06;
  }
  .solo-card.workout::after { background: var(--olive); }
  .solo-card.bible::after { background: var(--gold); }
  .solo-icon { font-size: 18px; margin-bottom: 8px; display: block; }
  .solo-num {
    font-family: 'Lora', serif; font-size: 40px; font-weight: 500;
    letter-spacing: -1px; line-height: 1; color: var(--text);
  }
  .solo-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 300; }
  .solo-ytd { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── HISTORY ITEMS ── */
  .history-item {
    padding: 12px 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .history-item:last-child { border-bottom: none; padding-bottom: 0; }
  .history-item:first-child { padding-top: 0; }
  .history-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 1px;
  }
  .history-icon.workout { background: rgba(74,90,56,0.1); }
  .history-icon.bible { background: rgba(201,168,76,0.12); }
  .history-icon.cold { background: rgba(61,95,117,0.1); }
  .history-icon.sauna { background: rgba(122,64,64,0.1); }
  .history-body { flex: 1; min-width: 0; }
  .history-owner { font-size: 11px; color: var(--olive); font-weight: 500; margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .history-meta { font-size: 12px; color: var(--text3); margin-top: 2px; font-weight: 300; }
  .history-notes { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; line-height: 1.4; }
  .history-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .history-time { font-size: 11px; color: var(--text3); font-weight: 300; }
  .delete-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 4px; transition: color 0.15s; }
  .delete-btn:active { color: var(--red); }

  /* ── HIST TABS ── */
  .hist-tabs {
    display: flex; gap: 0; margin-bottom: 16px;
    background: var(--surface2); border-radius: 10px; padding: 3px;
    border: 1px solid var(--border);
  }
  .hist-tab {
    flex: 1; padding: 7px 12px; border-radius: 8px; border: none;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 400; color: var(--text2);
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .hist-tab.active { background: var(--surface); color: var(--olive); font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  /* ── LOG TYPE GRID ── */
  .log-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .log-type-btn {
    padding: 18px 12px; border-radius: var(--r);
    border: 1.5px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .log-type-btn .log-icon { font-size: 22px; }
  .log-type-btn .log-name { font-size: 12px; font-weight: 500; color: var(--text2); }
  .log-type-btn.selected { border-color: var(--olive); background: var(--olive-light); box-shadow: 0 0 0 1px var(--olive); }
  .log-type-btn.selected .log-name { color: var(--olive); }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; padding: 13px 14px; border-radius: var(--r-sm);
    border: 1.5px solid var(--border); background: var(--bg);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400;
    color: var(--text); outline: none; transition: border-color 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--olive); background: var(--surface); }
  .form-input::placeholder { color: var(--text3); }

  /* ── CHIPS ── */
  .chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--bg); font-family: 'Inter', sans-serif; font-size: 13px;
    font-weight: 400; color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .chip.selected { background: var(--olive); border-color: var(--olive); color: white; }

  /* ── SLIDER ── */
  .slider-value { font-family: 'Lora', serif; font-size: 36px; font-weight: 500; color: var(--olive); text-align: center; margin-bottom: 8px; letter-spacing: -1px; }
  input[type=range] { width: 100%; height: 3px; border-radius: 2px; background: var(--border); outline: none; -webkit-appearance: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--olive); box-shadow: 0 2px 8px rgba(74,90,56,0.3); }
  .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 8px; font-weight: 300; letter-spacing: 0.5px; }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%; padding: 15px; border-radius: 50px; border: none;
    background: var(--olive); color: white; font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    margin-top: 8px; box-shadow: 0 4px 16px rgba(74,90,56,0.25);
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── PROFILE ── */
  .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--olive); display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 28px; color: white; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(74,90,56,0.2); }
  .profile-name { font-family: 'Lora', serif; font-size: 26px; font-weight: 500; margin-bottom: 4px; }
  .profile-email { font-size: 13px; color: var(--text3); margin-bottom: 24px; font-weight: 300; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    background: rgba(250,248,242,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-start; padding-top: 8px; z-index: 200;
  }
  .nav-inner { width: 100%; max-width: 480px; margin: 0 auto; display: flex; align-items: flex-start; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; cursor: pointer; border: none; background: none; }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; }
  .nav-item.active .nav-label { color: var(--olive); }
  .nav-fab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; margin-top: -18px; cursor: pointer; border: none; background: none; padding: 0; }
  .fab-circle { width: 52px; height: 52px; border-radius: 50%; background: var(--olive); display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; font-weight: 300; box-shadow: 0 4px 16px rgba(74,90,56,0.35); transition: transform 0.15s; line-height: 1; padding-bottom: 2px; }
  .nav-fab:active .fab-circle { transform: scale(0.92); }
  .nav-fab .nav-label { color: var(--text3); }
  .nav-fab.active .nav-label { color: var(--olive); }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 28px 16px; color: var(--text3); }
  .empty-text { font-size: 13px; font-weight: 300; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%) translateY(8px); background: var(--text); color: white; padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; z-index: 400; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <svg width="96" height="96" viewBox="0 0 90 90" fill="none">
    <path d="M10 64 Q10 76 45 76 Q80 76 80 64 L80 58 Q80 50 45 50 Q10 50 10 58 Z" fill="#4a5a38"/>
    <line x1="45" y1="50" x2="45" y2="76" stroke="#f0ece2" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="16" y1="58" x2="41" y2="58" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="16" y1="64" x2="41" y2="64" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="16" y1="70" x2="34" y2="70" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="74" y1="58" x2="49" y2="58" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="74" y1="64" x2="49" y2="64" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="74" y1="70" x2="56" y2="70" stroke="#f0ece2" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <circle cx="45" cy="30" r="17" fill="#4a5a38"/>
    <path d="M35 23 Q35 10 45 10 Q55 10 55 23" fill="none" stroke="#4a5a38" stroke-width="4" stroke-linecap="round"/>
    <rect x="33" y="21" width="24" height="5" rx="2.5" fill="#4a5a38"/>
  </svg>
  <div class="auth-title">Iron & Word</div>
  <div class="auth-tagline">Forge the body · Feed the soul</div>
  <button class="btn-google" onclick="login()">
    <svg viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
</div>

<!-- APP -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 90 90" fill="none">
          <path d="M10 64 Q10 76 45 76 Q80 76 80 64 L80 58 Q80 50 45 50 Q10 50 10 58 Z" fill="#4a5a38"/>
          <line x1="45" y1="50" x2="45" y2="76" stroke="#f0ece2" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="16" y1="58" x2="41" y2="58" stroke="#f0ece2" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

const ALLOWED = ["adamhlavka@gmail.com", "zmudariel@gmail.com"];
const ADAM = "adamhlavka@gmail.com";
const NETLIFY_URL = "https://ironandword.netlify.app";

let currentUser = null, currentUserName = "";
let previewAs = "adam";   // what dashboard/history shows (adam can toggle to "ariel")
let logAs = "adam";       // who we're logging for (adam can switch to "ariel")
let currentPeriod = "month", historyPeriod = "month", histTab = "all";

/* ── AUTH ── */
window.login = async () => {

window.logout = async () => { await supabase.auth.signOut(); location.reload(); };

async function init() {
  const h = window.location.hash, s = window.location.search;
  if (h || s.includes("code=") || s.includes("access_token")) {
    try { await supabase.auth.exchangeCodeForSession(window.location.href); } catch(e) {}
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { document.getElementById("auth-screen").style.display = "flex"; return; }

  const email = session.user.email.toLowerCase();
  if (!ALLOWED.includes(email)) {
    await supabase.auth.signOut();

    return;

  currentUser = session.user;
  currentUserName = email === ADAM ? "adam" : "ariel";
  previewAs = currentUserName;
  logAs = currentUserName;

  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  if (currentUserName === "adam") {
    document.getElementById("preview-toggle").classList.add("show");

    document.getElementById("lt-sauna").style.display = "flex";
    document.getElementById("hist-tab-private").style.display = "block";

  document.getElementById("profile-name").textContent = currentUserName === "adam" ? "Adam Hlávka" : "Ariel";

  loadDashboard(); loadHistory();
}

/* ── PREVIEW TOGGLE (dashboard view) ── */

window.showPage = (page) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-item, .nav-fab").forEach(n => n.classList.remove("active"));

  if (page === "home") loadDashboard();
  if (page === "history") loadHistory();
};

/* ── DATES ── */
function getPeriodRange(p) {
  const now = new Date(); let start;
  if (p === "week") { start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0); }
  else if (p === "month") start = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (p === "year") start = new Date(now.getFullYear(), 0, 1);
  else start = new Date(2020, 0, 1);
  return { start, end: now };
}
function filterByPeriod(data, p) {
  const { start, end } = getPeriodRange(p);
  return data.filter(r => { const d = new Date(r.created_at); return d >= start && d <= end; });
}

/* ── DASHBOARD ── */
window.setPeriod = (p, btn) => {
  currentPeriod = p;
  document.querySelectorAll("#period-picker .period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active"); loadDashboard();
};

async function loadDashboard() {
  const isAdam = currentUserName === "adam";
  const lbl = { month:"This Month", week:"This Week", year:"This Year", all:"All Time" }[currentPeriod];
  const el = document.getElementById("dashboard-content");

  // Both users see full comparison — private section only shown to Adam
  const { data: allData } = await supabase.from("logs").select("*").eq("deleted", false).in("owner", ["adam","ariel"]);
  if (!allData) return;

  const filtered = filterByPeriod(allData, currentPeriod);
  const ytd = filterByPeriod(allData, "year");

  const adamF = filtered.filter(r => r.owner === "adam");
  const arielF = filtered.filter(r => r.owner === "ariel");

  const adamW = adamF.filter(r => r.type === "workout").length;
  const arielW = arielF.filter(r => r.type === "workout").length;
  const adamB = adamF.filter(r => r.type === "bible").length;
  const arielB = arielF.filter(r => r.type === "bible").length;

  const adamWY = ytd.filter(r => r.owner === "adam" && r.type === "workout").length;
  const arielWY = ytd.filter(r => r.owner === "ariel" && r.type === "workout").length;
  const adamBY = ytd.filter(r => r.owner === "adam" && r.type === "bible").length;
  const arielBY = ytd.filter(r => r.owner === "ariel" && r.type === "bible").length;

  const wLead = adamW > arielW ? "adam" : adamW < arielW ? "ariel" : "tie";
  const bLead = adamB > arielB ? "adam" : adamB < arielB ? "ariel" : "tie";

  // private section — adam only regardless of preview
  const filtPrivate = filterByPeriod(allData.filter(r => r.owner === "adam"), currentPeriod);
  const colds = filtPrivate.filter(r => r.type === "cold").length;
  const saunas = filtPrivate.filter(r => r.type === "sauna").length;

  el.innerHTML = `
    <div class="compare-header">
      <div class="compare-col">
        <div class="compare-col-head">Adam</div>
        <div class="compare-col-body">
          <div class="compare-stat">
            <div class="compare-stat-label">🏋️ Workouts</div>
            <div class="compare-stat-num ${wLead==="adam"?"leading":wLead==="ariel"?"trailing":""}">${adamW}</div>
          </div>
          <div class="compare-stat">
            <div class="compare-stat-label">📖 Bible</div>
            <div class="compare-stat-num ${bLead==="adam"?"leading":bLead==="ariel"?"trailing":""}">${adamB}</div>
          </div>
        </div>
      </div>
      <div class="compare-col">
        <div class="compare-col-head muted">Ariel</div>
        <div class="compare-col-body">
          <div class="compare-stat">
            <div class="compare-stat-label">🏋️ Workouts</div>
            <div class="compare-stat-num ${wLead==="ariel"?"leading":wLead==="adam"?"trailing":""}">${arielW}</div>
          </div>
          <div class="compare-stat">
            <div class="compare-stat-label">📖 Bible</div>
            <div class="compare-stat-num ${bLead==="ariel"?"leading":bLead==="adam"?"trailing":""}">${arielB}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="ytd-strip">
      <div class="ytd-card">
        <div><div class="ytd-icon">🏋️</div><div class="ytd-label">Workouts · Year to date</div></div>
        <div class="ytd-nums">
          <div class="ytd-num"><div class="ytd-num-val" style="color:var(--olive)">${adamWY}</div><div class="ytd-num-name">Adam</div></div>
          <div class="ytd-divider"></div>
          <div class="ytd-num"><div class="ytd-num-val">${arielWY}</div><div class="ytd-num-name">Ariel</div></div>
        </div>
      </div>
      <div class="ytd-card">
        <div><div class="ytd-icon">📖</div><div class="ytd-label">Bible · Year to date</div></div>
        <div class="ytd-nums">
          <div class="ytd-num"><div class="ytd-num-val" style="color:var(--olive)">${adamBY}</div><div class="ytd-num-name">Adam</div></div>
          <div class="ytd-divider"></div>
          <div class="ytd-num"><div class="ytd-num-val">${arielBY}</div><div class="ytd-num-name">Ariel</div></div>
        </div>
      </div>
    </div>

    ${isAdam ? `<div class="section-label">My Private Habits · ${lbl}</div>
    <div class="private-strip">
      <div class="private-card"><span class="private-icon">🧊</span><div class="private-num">${colds}</div><div class="private-label">Cold Sessions</div></div>
      <div class="private-card"><span class="private-icon">🔥</span><div class="private-num">${saunas}</div><div class="private-label">Sauna Sessions</div></div>
    </div>` : ""}

    <div class="section-label">Recent Activity</div>
    <div class="card"><div id="recent-list"></div></div>`;

  const recent = [...allData].filter(r => r.type !== "cold" && r.type !== "sauna")
    .sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,6);
  document.getElementById("recent-list").innerHTML = recent.length
    ? recent.map(r => itemHTML(r, false)).join("")
    : `<div class="empty"><div class="empty-text">No activity yet</div></div>`;
}

/* ── HISTORY ── */
window.setHistoryPeriod = (p, btn) => {
  historyPeriod = p;
  document.querySelectorAll("#hist-period-picker .period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active"); loadHistory();
};
window.setHistTab = (tab, btn) => {
  histTab = tab;
  document.querySelectorAll(".hist-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active"); loadHistory();
};

async function loadHistory() {
  const isAdam = currentUserName === "adam";
  const showPrivate = isAdam && previewAs === "adam";

  // Everyone sees both users' public data
  const owners = ["adam","ariel"];

  const { data: all } = await supabase.from("logs").select("*")
    .eq("deleted", false).in("owner", owners)
    .order("created_at", { ascending: false });
  if (!all) return;

  let filtered = filterByPeriod(all, historyPeriod);

  if (histTab === "workout") filtered = filtered.filter(r => r.type === "workout");
  else if (histTab === "bible") filtered = filtered.filter(r => r.type === "bible");
  else if (histTab === "private") filtered = filtered.filter(r => r.type === "cold" || r.type === "sauna");
  else {
    // "all" tab — hide private unless adam viewing as adam
    if (!showPrivate) filtered = filtered.filter(r => r.type !== "cold" && r.type !== "sauna");
  }

  // in Ariel preview mode, hide delete buttons and private types
  document.getElementById("hist-list").innerHTML = filtered.length
    ? filtered.map(r => itemHTML(r, previewAs === "adam")).join("")
    : `<div class="empty" style="padding:24px 0"><div class="empty-text">Nothing here yet</div></div>`;
}

function itemHTML(row, showDelete) {
  const d = new Date(row.created_at);
  const date = d.toLocaleDateString("en-GB", {day:"numeric", month:"short"});
  const time = d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  const icons = { workout:"🏋️", bible:"📖", cold:"🧊", sauna:"🔥" };
  let title="", meta="", notes="";

  if (row.type === "workout") {
    title = row.data?.workout_type || "Workout";
    meta = [row.data?.focus, row.data?.duration&&row.data.duration+" min", row.data?.intensity&&"Intensity "+row.data.intensity+"/10", row.data?.time_of_day].filter(Boolean).join(" · ");
    notes = row.data?.notes || "";
  } else if (row.type === "bible") {
    title = row.data?.passage || "Bible Reading";
    meta = row.data?.duration ? row.data.duration+" min" : "";
    notes = row.data?.notes || "";
  } else if (row.type === "cold") {
    title = row.data?.method || "Cold Exposure";
    meta = [row.data?.duration&&row.data.duration+" min", row.data?.temp&&row.data.temp+"°C", row.data?.place].filter(Boolean).join(" · ");
    notes = row.data?.notes || "";
  } else if (row.type === "sauna") {
    title = row.data?.sauna_type || "Sauna";
    meta = [row.data?.location, row.data?.duration&&row.data.duration+" min", row.data?.cycles&&row.data.cycles+" cycles"].filter(Boolean).join(" · ");
    notes = row.data?.notes || "";
  }

  const canDelete = showDelete && (row.user_email === currentUser.email || currentUserName === "adam");
  const ownerLabel = row.owner === "adam" ? "Adam" : "Ariel";

  return `<div class="history-item" id="entry-${row.id}">
    <div class="history-icon ${row.type}">${icons[row.type]||"○"}</div>
    <div class="history-body">
      <div class="history-owner">${ownerLabel}</div>
      <div class="history-title">${title}</div>
      ${meta ? `<div class="history-meta">${meta}</div>` : ""}
      ${notes ? `<div class="history-notes">${notes}</div>` : ""}
    </div>
    <div class="history-right">
      <div class="history-time">${date} · ${time}</div>
      ${canDelete ? `<button class="delete-btn" onclick="deleteEntry(${row.id})">✕</button>` : ""}
    </div>
  </div>`;
}

/* ── DELETE ── */
window.deleteEntry = async (id) => {
  if (!confirm("Delete this entry?")) return;
  const { data: row } = await supabase.from("logs").select("owner,user_email").eq("id", id).single();
  if (!row) return;
  if (row.user_email !== currentUser.email && currentUserName !== "adam") { showToast("Can't delete this"); return; }
  await supabase.from("logs").update({deleted: true}).eq("id", id);
  document.getElementById("entry-" + id)?.remove();
  showToast("Deleted"); loadDashboard();
};

function renderLogTypeGrid() {
  ["workout","bible","cold","sauna"].forEach(t => {
    const el = document.getElementById("lt-" + t);
    if (el) el.classList.toggle("selected", t === selectedLogType);
  });
}

function renderLogForm(type) {
  const forms = { workout: workoutForm, bible: bibleForm, cold: coldForm, sauna: saunaForm };
  document.getElementById("log-form-area").innerHTML = forms[type] ? forms[type]() : "";
  logFormData = {};
  if (document.getElementById("slider-intensity")) logFormData.intensity = 5;
}

const ch = (opts, field) => opts.map(v => `<button class="chip" onclick="toggleChip(this,'${field}','${v}',true)">${v}</button>`).join("");
const timeChips = () => [["🌅","Morning"],["☀️","Noon"],["🌤","Afternoon"],["🌙","Evening"]].map(([e,v]) => `<button class="chip" onclick="toggleChip(this,'time_of_day','${v}',true)">${e} ${v}</button>`).join("");
const slider = (field, lo, mid, hi) => `<div class="slider-value" id="slider-val-${field}">5</div><input type="range" min="1" max="10" value="5" id="slider-${field}" oninput="updateSlider('${field}',this.value)"><div class="slider-labels"><span>${lo}</span><span>${mid}</span><span>${hi}</span></div>`;

function workoutForm() { return `
  <div class="section-label" style="margin-top:20px">Type of Workout</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Kettlebell","Weightlifting","Running","Swimming","Hiking"],"workout_type")}</div></div>
  <div class="section-label">Focus</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Cardio","Strength","Both"],"focus")}</div></div>
  <div class="section-label">Time of Day</div>
  <div class="card" style="padding:16px"><div class="chip-group">${timeChips()}</div></div>
  <div class="section-label">Duration & Intensity</div>
  <div class="card">
    <div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-input" type="number" min="1" max="300" placeholder="45" oninput="setField('duration',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Intensity</label>${slider("intensity","Easy","Moderate","Max")}</div>
  </div>
  <div class="section-label">Notes</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="3" placeholder="How did it go?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Workout</button><div style="height:16px"></div>`; }

function bibleForm() { return `
  <div class="section-label" style="margin-top:20px">Passage</div>
  <div class="card" style="padding:16px"><input class="form-input" placeholder="e.g. Psalm 23, John 3:16–21" oninput="setField('passage',this.value)"></div>
  <div class="section-label">Duration (minutes)</div>
  <div class="card" style="padding:16px"><input class="form-input" type="number" min="1" placeholder="20" oninput="setField('duration',this.value)"></div>
  <div class="section-label">Notes & Reflections</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="4" placeholder="What stood out to you?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Reading</button><div style="height:16px"></div>`; }

function coldForm() { return `
  <div class="section-label" style="margin-top:20px">Method</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Cold Shower","Cold Plunge","Ice Bath"],"method")}</div></div>
  <div class="section-label">Place</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Home","Gym","Nature","Spa"],"place")}</div></div>
  <div class="section-label">Duration & Temperature</div>
  <div class="card">
    <div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-input" type="number" min="1" placeholder="5" oninput="setField('duration',this.value)"></div>
    <div class="form-group"><label class="form-label">Water Temperature (°C)</label><input class="form-input" type="number" placeholder="12" oninput="setField('temp',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Intensity</label>${slider("intensity","Manageable","Hard","Brutal")}</div>
  </div>
  <div class="section-label">Notes</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="3" placeholder="How did it feel?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Cold Session</button><div style="height:16px"></div>`; }

function saunaForm() { return `
  <div class="section-label" style="margin-top:20px">Type</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Finnish","Infrared"],"sauna_type")}</div></div>
  <div class="section-label">Location</div>
  <div class="card" style="padding:16px"><div class="chip-group">${ch(["Home","Gym","Spa","Public"],"location")}</div></div>
  <div class="section-label">Duration & Cycles</div>
  <div class="card">
    <div class="form-group"><label class="form-label">Total Duration (minutes)</label><input class="form-input" type="number" min="1" placeholder="60" oninput="setField('duration',this.value)"></div>
    <div class="form-group" style="margin-bottom:0"><label class="form-label">Number of Cycles</label><input class="form-input" type="number" min="1" placeholder="3" oninput="setField('cycles',this.value)"></div>
  </div>
  <div class="section-label">Notes</div>
  <div class="card" style="padding:16px"><textarea class="form-input" rows="3" placeholder="How was it?" style="resize:none" oninput="setField('notes',this.value)"></textarea></div>
  <button class="btn-primary" onclick="saveEntry()">Save Sauna Session</button><div style="height:16px"></div>`; }

/* ── HELPERS ── */
window.toggleChip = (el, field, value, exclusive) => {
  if (exclusive) el.closest(".chip-group").querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
  el.classList.toggle("selected");
  if (el.classList.contains("selected")) logFormData[field] = value; else delete logFormData[field];
};
window.setField = (field, value) => { logFormData[field] = value; };
window.updateSlider = (field, value) => {
  document.getElementById("slider-val-" + field).textContent = value;
  logFormData[field] = parseInt(value);
};

/* ── SAVE ── */
window.saveEntry = async () => {
  if (!selectedLogType) return;
  if (selectedLogType === "workout" && !logFormData.workout_type) { showToast("Select a workout type"); return; }
  if (selectedLogType === "bible" && !logFormData.passage?.trim()) { showToast("Enter a Bible passage"); return; }
  if (selectedLogType === "cold" && !logFormData.method) { showToast("Select a method"); return; }
  if (selectedLogType === "sauna" && !logFormData.sauna_type) { showToast("Select sauna type"); return; }

  const btn = document.querySelector("#page-log .btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }

  const owner = (selectedLogType === "cold" || selectedLogType === "sauna") ? "adam" : logAs;

  const { error } = await supabase.from("logs").insert([{
    user_id: currentUser.id, user_email: currentUser.email,
    type: selectedLogType, owner, data: { ...logFormData }, deleted: false
  }]);

  if (error) { showToast("Error — try again"); if (btn) { btn.disabled = false; btn.textContent = "Save"; } return; }
  showToast("✓ Saved");
  setTimeout(() => showPage("home"), 500);
};

/* ── TOAST ── */
window.showToast = (msg) => {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
};

window.onload = init;
</script>
</body>
</html>
