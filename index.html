<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iron & Word</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    button {
      background: #6b705c;
      color: white;
      border: none;
      padding: 15px;
      margin: 10px;
      width: 300px;
      border-radius: 10px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      max-width: 400px;
    }
  </style>
</head>

<body>

<h1>Iron & Word</h1>

<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" style="display:none;">
  <p id="user"></p>
  <button onclick="logout()">Logout</button>

  <div class="card">
    <h3>Quick Test</h3>
    <button onclick="save()">Save Test Log</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

// LOGIN (FIXED)
async function login() {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://adamdev090.github.io/iron-word-app/"
    }
  });
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// CHECK SESSION
async function init() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) return;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("user").innerText =
    "Logged in as: " + data.user.email;

  loadHistory();
}

// SAVE TEST DATA
async function save() {
  const { data } = await supabase.auth.getUser();

  await supabase.from("logs").insert([
    {
      user_id: data.user.id,
      user_email: data.user.email,
      type: "test",
      category: "test",
      data: { test: "working" },
      created_at: new Date()
    }
  ]);

  alert("Saved ✅");
  loadHistory();
}

// LOAD HISTORY
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(row => {
    html += `<div>${row.user_email} - ${row.type}</div>`;
  });

  document.getElementById("history").innerHTML = html;
}

init();
</script>

</body>
</html>
