<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron & Word</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* =========================
   🔐 SUPABASE CONFIG
========================= */
const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "sb_publishable_c-u4pzu0HaUvKh6Wgwa5iw_0IKCNOKR"
);

/* =========================
   👥 ALLOWED USERS
========================= */
const ALLOWED_USERS = [
  "adamhlavka@gmail.com",
  "zmudariel@gmail.com"
].map(e => e.toLowerCase());

let currentUser = null;

/* =========================
   🔑 AUTH FUNCTIONS
========================= */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/iron-word-app/"
    }
  });
};

window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* =========================
   🚀 INIT (APP START)
========================= */
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  const user = session.user;
  const email = user.email?.toLowerCase();

  console.log("Logged in as:", email);

  /* =========================
     🔐 ACCESS CONTROL
  ========================= */
  if (!ALLOWED_USERS.includes(email)) {
    document.body.innerHTML = `
      <h2 style="text-align:center; margin-top:50px;">
        Access denied 🚫
      </h2>
      <p style="text-align:center;">
        This is a private Iron & Word app
      </p>
    `;
    return;
  }

  currentUser = user;

  const name =
    user.user_metadata.full_name?.split(" ")[0] || "User";

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Welcome " + name;

  renderForm();
  loadHistory();
}

/* =========================
   🧾 FORM RENDERING
========================= */
function renderForm() {
  const type = document.getElementById("type").value;

  let html = `
    <input id="date" type="datetime-local">
  `;

  if (type === "workout") {
    html += `
      <select id="category">
        <option>Kettlebell</option>
        <option>Dumbbell + Barbell</option>
        <option>Running</option>
        <option>Swimming</option>
        <option>Hiking</option>
      </select>

      <select id="location">
        <option>Home</option>
        <option>Gym</option>
        <option>Hotel</option>
        <option>Work</option>
      </select>

      <input id="duration" placeholder="Duration (minutes)">
      <input id="intensity" placeholder="Intensity (1-10)">
    `;
  }

  if (type === "bible") {
    html += `
      <input id="duration" placeholder="Minutes">
      <input id="notes" placeholder="What did you read?">
    `;
  }

  if (type === "practice") {
    html += `
      <select id="category">
        <option>Cold Exposure</option>
        <option>Sauna</option>
        <option>Reading</option>
        <option>Friendship</option>
        <option>Marriage</option>
        <option>Kids</option>
      </select>

      <input id="notes" placeholder="Details">
    `;
  }

  document.getElementById("dynamic").innerHTML = html;

  // default = now
  const now = new Date().toISOString().slice(0,16);
  document.getElementById("date").value = now;
}

window.renderForm = renderForm;

/* =========================
   💾 SAVE SESSION
========================= */
window.save = async () => {
  const type = document.getElementById("type").value;
  const selectedDate = document.getElementById("date").value;

  let data = {};

  if (type === "workout") {
    data = {
      category: document.getElementById("category").value,
      location: document.getElementById("location").value,
      duration: document.getElementById("duration").value,
      intensity: document.getElementById("intensity").value
    };
  }

  if (type === "bible" || type === "practice") {
    data = {
      category: document.getElementById("category")?.value,
      notes: document.getElementById("notes").value
    };
  }

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type,
    category: data.category || type,
    data,
    created_at: selectedDate,
    deleted: false
  }]);

  alert("Saved ✅");
  loadHistory();
};

/* =========================
   📜 LOAD HISTORY
========================= */
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(row => {
    const date = new Date(row.created_at).toLocaleDateString();

    html += `
      <div class="history-item">
        <strong>${row.type}</strong> · ${date}<br>
        ${JSON.stringify(row.data)}
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

window.onload = init;
</script>

<style>
body {
  font-family: Arial;
  background: #f6f6f2;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  border-radius: 14px;
  max-width: 420px;
}

button {
  background: #7a7f5a;
  color: white;
  border: none;
  padding: 14px;
  margin: 10px;
  width: 90%;
  border-radius: 10px;
  font-size: 16px;
}

input, select {
  padding: 10px;
  margin: 6px;
  width: 90%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.history-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<h1>Iron & Word</h1>

<!-- LOGIN -->
<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="card">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Record Session</h3>

    <select id="type" onchange="renderForm()">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
      <option value="practice">Personal Practices</option>
    </select>

    <div id="dynamic"></div>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

</body>
</html>
