<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron & Word</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://hkaligxxiojdgttnfyxp.supabase.co",
  "YOUR_ANON_KEY"
);

const ALLOWED_USERS = [
  "adamhlavka@gmail.com",
  "zmudariel@gmail.com"
];

let currentUser = null;
let historyExpanded = false;

/* LOGIN */
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/iron-word-app/",
      queryParams: { prompt: "select_account" }
    }
  });
};

/* LOGOUT */
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* INIT */
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("auth").style.display = "block";
    return;
  }

  const user = session.user;
  const email = user.email.toLowerCase();

  if (!ALLOWED_USERS.includes(email)) {
    document.body.innerHTML = `
      <div style="text-align:center;margin-top:80px;">
        <h2>Private App 🔒</h2>
        <p>${email}</p>
        <button onclick="logout()">Try another account</button>
      </div>
    `;
    return;
  }

  currentUser = user;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText =
    "Welcome " + (email.includes("adam") ? "Adam" : "Ariel");

  renderForm();
  loadDashboard();
  loadHistory();
}

/* SAVE */
window.save = async () => {
  const type = document.getElementById("type").value;
  const owner = document.getElementById("owner").value;

  let data = {
    owner
  };

  if (type === "workout") {
    data.duration = document.getElementById("duration").value;
    data.intensity = document.getElementById("intensity").value;
  }

  if (type === "bible") {
    data.duration = document.getElementById("duration").value;
    data.notes = document.getElementById("notes").value;
  }

  if (type === "practice") {
    data.notes = document.getElementById("notes").value;
  }

  await supabase.from("logs").insert([{
    user_id: currentUser.id,
    user_email: currentUser.email,
    type,
    data,
    created_at: document.getElementById("date").value,
    deleted: false
  }]);

  loadHistory();
  loadDashboard();
};

/* DELETE */
window.deleteEntry = async (id) => {
  await supabase.from("logs")
    .update({ deleted: true })
    .eq("id", id);

  loadHistory();
  loadDashboard();
};

/* FORM */
function renderForm() {
  const type = document.getElementById("type").value;

  let html = `
    <input id="date" type="datetime-local">

    <select id="owner">
      <option value="adam">Adam</option>
      <option value="ariel">Ariel</option>
    </select>
  `;

  if (type === "workout") {
    html += `
      <input id="duration" placeholder="Minutes">
      <input id="intensity" placeholder="Intensity">
    `;
  }

  if (type === "bible" || type === "practice") {
    html += `
      <input id="duration" placeholder="Minutes">
      <input id="notes" placeholder="Notes">
    `;
  }

  document.getElementById("dynamic").innerHTML = html;
  document.getElementById("date").value =
    new Date().toISOString().slice(0,16);
}

window.renderForm = renderForm;

/* DASHBOARD */
async function loadDashboard() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false);

  const users = { adam: {workout:0,bible:0}, ariel: {workout:0,bible:0} };

  data.forEach(row => {
    const owner = row.data.owner;

    if (row.type === "workout") users[owner].workout++;
    if (row.type === "bible") users[owner].bible++;
  });

  document.getElementById("dashboard").innerHTML = `
    <div>Adam: 🏋️ ${users.adam.workout} 📖 ${users.adam.bible}</div>
    <div>Ariel: 🏋️ ${users.ariel.workout} 📖 ${users.ariel.bible}</div>
  `;
}

/* HISTORY */
async function loadHistory() {
  const { data } = await supabase
    .from("logs")
    .select("*")
    .eq("deleted", false)
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(row => {

    // 🔐 privacy
    if (
      row.type === "practice" &&
      currentUser.email.includes("zmudariel")
    ) return;

    const d = new Date(row.created_at);

    html += `
      <div class="history-item">
        <div style="display:flex;justify-content:space-between;">
          <strong>${row.type} (${row.data.owner})</strong>
          <button onclick="deleteEntry(${row.id})">✕</button>
        </div>

        <div>${d.toLocaleDateString()}</div>
        <div class="muted">${JSON.stringify(row.data)}</div>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

window.onload = init;
</script>

<style>
body {
  font-family: -apple-system;
  background: #f4f4ef;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  max-width: 420px;
  border-radius: 15px;
}

button {
  background: #7a7f5a;
  color: white;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

.history-item {
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.muted {
  color: #666;
}
</style>
</head>

<body>

<h1>Iron & Word</h1>

<div id="auth">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" style="display:none">

  <div class="card">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Dashboard</h3>
    <div id="dashboard"></div>
  </div>

  <div class="card">
    <h3>Record Session</h3>

    <select id="type" onchange="renderForm()">
      <option value="workout">Workout</option>
      <option value="bible">Bible</option>
      <option value="practice">Personal Practices</option>
    </select>

    <div id="dynamic"></div>

    <button onclick="save()">Save</button>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

</body>
</html>
